app:
  name: tidewise-api
  env: prod
server:
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 5
  write_timeout_seconds: 10
log:
  level: warn
agent_platform:
  base_url: https://agent.example.com
  callback_path: /api/v1/agent/callbacks
database:
  host: db-prod.example.internal
  port: 5432
  name: tidewise_prod
  user: tidewise_prod
  ssl_mode: require
  max_open_conns: 30
  max_idle_conns: 15
  conn_max_lifetime_seconds: 300
  connect_timeout_seconds: 5
redis:
  address: redis-prod.example.internal:6379
neo4j:
  enabled: false
  uri: bolt://neo4j-prod.example.internal:7687
  database: neo4j
  username_env: NEO4J_USERNAME
  password_env: NEO4J_PASSWORD
  connect_timeout_seconds: 5
  max_connection_pool_size: 20
migration:
  directory: migrations
  auto_apply: false
  lock_key: tidewise_schema_migration
object_store:
  provider: local
  local_path: /var/lib/tidewise/raw-objects
rate_limit:
  default_requests_per_minute: 120
security:
  jwt_issuer: tidewise
