openapi: 3.0.3
info:
  title: Tidewise Data Service API
  version: 2.0.0
  description: >-
    Data Service 内部 HTTP REST + JSON 合同。消费方拥有小型手写 typed client，
    并以本文件的 operationId、schema drift anchor 和静态合同测试防止漂移。
x-contract-id: tidewise-data-v2
x-handwritten-client-policy: consumer-owned-small-typed-clients
servers:
  - url: /
    description: 由运行环境注入 Data Service origin；合同只冻结路径。
security:
  - ServiceBearer: []
tags:
  - name: Research
  - name: Admin aggregates
  - name: Event publication
  - name: Retired imports
  - name: Research Theme import
  - name: Research Anchor import

paths:
  /internal/data/v1/research/themes:
    get:
      tags: [Research]
      operationId: listResearchThemes
      x-client-drift-anchor: data.v1.listResearchThemes
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Miniapp Research theme 页面聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/WindowHours'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Theme 页面聚合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
    get:
      tags: [Research]
      operationId: getResearchTheme
      x-client-drift-anchor: data.v1.getResearchTheme
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Research theme 及其证据聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/WindowHours'
      responses:
        '200':
          description: Theme 详情聚合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}/reasoning-trees:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
    get:
      tags: [Research]
      operationId: listResearchThemeReasoningTrees
      x-client-drift-anchor: data.v1.listResearchThemeReasoningTrees
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Theme 的全部推理树 Tab 摘要
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '200':
          description: Theme 摘要和完整推理树 Tab 集合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReasoningTreeListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}/reasoning-trees/{anchor_id}:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
      - $ref: '#/components/parameters/AnchorID'
    get:
      tags: [Research]
      operationId: getResearchThemeReasoningTree
      x-client-drift-anchor: data.v1.getResearchThemeReasoningTree
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Theme 下的一棵完整推理树
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '200':
          description: 单棵推理树完整快照
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReasoningTreeDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/admin/raw-documents:
    get:
      tags: [Admin aggregates]
      operationId: listAdminRawDocuments
      x-client-drift-anchor: data.v1.listAdminRawDocuments
      x-required-service-scope: data.admin.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Admin 原始文档分页聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          schema:
            type: string
            maxLength: 200
        - name: source_ref
          in: query
          schema:
            type: string
            maxLength: 256
        - name: ingest_status
          in: query
          schema:
            $ref: '#/components/schemas/IngestStatus'
      responses:
        '200':
          description: 原始文档分页
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRawDocumentPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/admin/events:
    get:
      tags: [Admin aggregates]
      operationId: listAdminEvents
      x-client-drift-anchor: data.v1.listAdminEvents
      x-required-service-scope: data.admin.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Admin 全球事件分页聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          schema:
            type: string
            maxLength: 200
        - name: event_status
          in: query
          schema:
            $ref: '#/components/schemas/EventStatus'
        - name: fact_status
          in: query
          schema:
            $ref: '#/components/schemas/FactStatus'
        - name: event_time_from
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: event_time_to
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_from
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_to
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
      responses:
        '200':
          description: 全球事件分页
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEventPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/raw-document-imports:
    post:
      tags: [Retired imports]
      operationId: retiredRawDocumentImportV1
      x-client-drift-anchor: data.v1.retiredRawDocumentImportV1
      x-required-service-scope: data.reviewed-events.import
      x-retry-policy: none
      summary: 已退役的 Raw Document Import V1
      description: 认证成功后始终返回 410；请使用 Event Publication V2。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '410':
          $ref: '#/components/responses/Gone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/raw-document-imports/{idempotency_key}:
    parameters:
      - name: idempotency_key
        in: path
        required: true
        description: 历史 V1 路径参数，仅用于返回 410。
        schema:
          type: string
          minLength: 1
    get:
      tags: [Retired imports]
      operationId: retiredRawDocumentImportStatusV1
      x-client-drift-anchor: data.v1.retiredRawDocumentImportStatusV1
      x-required-service-scope: data.reviewed-events.import
      x-retry-policy: none
      summary: 已退役的 Raw Document Import V1 状态查询
      description: 认证成功后始终返回 410；V2 不提供状态接口。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '410':
          $ref: '#/components/responses/Gone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/reviewed-event-imports:
    post:
      tags: [Retired imports]
      operationId: retiredReviewedEventImportV1
      x-client-drift-anchor: data.v1.retiredReviewedEventImportV1
      x-required-service-scope: data.reviewed-events.import
      x-retry-policy: none
      summary: 已退役的 Reviewed Event Import V1
      description: 认证成功后始终返回 410；请使用 Event Publication V2。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '410':
          $ref: '#/components/responses/Gone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v2/reviewed-event-imports:
    post:
      tags: [Event publication]
      operationId: publishReviewedEventsV2
      x-client-drift-anchor: data.v2.publishReviewedEventsV2
      x-required-service-scope: data.reviewed-events.import
      x-retry-policy: retry-failed-call-with-natural-identities
      x-timeout-budget-ms: 15000
      x-atomicity: whole-batch-single-postgresql-transaction
      x-receipt-schema: event_publication_receipts
      x-transaction-membership: raw-document,event,event-source,event-tag,event-publication-receipt
      summary: 原子发布 1 到 10 个已审核 Event 及其轻量证据
      description: >-
        每次成功调用创建新的 immutable receipt。接口不使用幂等键；已存在的 Event、
        Artifact、Evidence Link 和 Tag Link 仅在自然身份和语义内容完全一致时复用，
        任一冲突或失败都会回滚整个 batch。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/EventPublicationV2Request'
      responses:
        '201':
          description: 完整 publication 和新 receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPublicationV2Envelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research-theme-imports:
    post:
      tags: [Research Theme import]
      operationId: importResearchThemes
      x-client-drift-anchor: data.v1.importResearchThemes
      x-required-service-scope: data.research.import
      x-retry-policy: idempotent-with-analysis-batch-id
      x-timeout-budget-ms: 15000
      x-canonicalization: rfc8785-sha256
      x-atomicity: whole-batch-single-postgresql-transaction
      x-receipt-schema: research_theme_import_receipts
      x-transaction-membership: research-theme-import-receipt,research-theme,research-theme-chain-node,research-theme-event
      summary: 原子发布一个不可变 Research Theme 批次快照
      description: >-
        analysis_batch_id 是唯一批次及幂等身份。发布者身份只从 Bearer service principal
        派生；同一主体、批次和 payload 重放首次结果，内容或主体冲突返回 409。
        themes、chain_nodes 和 events 必须按合同键升序提交，任一引用无效时整批回滚。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/ResearchThemeImportRequest'
      responses:
        '200':
          description: 相同发布主体、analysis_batch_id 与 payload 的首次结果重放
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeImportEnvelope'
        '201':
          description: Theme 批次和 immutable receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research-anchor-imports:
    post:
      tags: [Research Anchor import]
      operationId: importResearchAnchors
      x-client-drift-anchor: data.v1.importResearchAnchors
      x-required-service-scope: data.research.import
      x-retry-policy: idempotent-with-theme-id
      x-timeout-budget-ms: 15000
      x-canonicalization: rfc8785-sha256
      x-atomicity: whole-theme-single-postgresql-transaction
      x-receipt-schema: research_anchor_import_receipts
      x-transaction-membership: research-anchor-import-receipt,research-anchor,research-anchor-event,research-anchor-path-node
      summary: 原子发布一个 Theme 的完整 Research Anchor 推理树快照
      description: >-
        theme_id 是唯一幂等身份。发布主体必须与父 Theme Publication Receipt 一致；
        anchors 与 events 必须按合同键升序，path_nodes 顺序是业务事实。任一 Anchor、
        Event 或 Chain Node 引用无效时，整个 Theme 的 Anchor 集合回滚。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/ResearchAnchorImportRequest'
      responses:
        '200':
          description: 相同发布主体、theme_id 与 payload 的首次结果重放
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAnchorImportEnvelope'
        '201':
          description: 完整 Anchor 集合和 immutable receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAnchorImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    ServiceBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque service identity token
      description: >-
        环境 secret 注入的 service identity。服务端从认证 principal 派生 caller identity
        与 scope；request body 不得声明或覆盖 caller identity。

  parameters:
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: 可选 caller request id；缺失时服务端生成。不得作为业务幂等 identity。
      schema:
        type: string
        minLength: 1
        maxLength: 128
    WindowHours:
      name: window_hours
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 168
        default: 24
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 2048
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    ThemeID:
      name: theme_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UUID'
    AnchorID:
      name: anchor_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UUID'

  headers:
    RequestID:
      description: 本次 transport attempt 的 request id；重放时可以与首次请求不同。
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128

  responses:
    BadRequest:
      description: 请求 DTO、query 或边界不合法
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: service bearer identity 缺失或无效
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 已认证 principal 不具有 operation 所需 scope
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: caller scope 内不存在目标资源
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: 幂等 key 与 payload hash 冲突或 raw identity 冲突；零 mutation
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PayloadTooLarge:
      description: JSON request body 超过 1048576 bytes
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: 已解析 DTO 未通过 whole-batch 业务 validation；零 mutation
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 已认证调用命中了退役合同；不执行任何 mutation
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Data Service 内部错误
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    UUID:
      type: string
      format: uuid
      description: RFC 4122 UUID string。
    LowercaseUUID:
      type: string
      format: uuid
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      description: V1 publication contract 使用的标准小写 RFC 4122 UUID string。
    UTCTimestamp:
      type: string
      format: date-time
      description: UTC RFC3339 timestamp；response 必须使用 UTC offset Z。
    PayloadHash:
      type: string
      minLength: 64
      maxLength: 64
      pattern: '^[0-9a-f]{64}$'
      description: 服务端生成的 lowercase SHA-256 hex。
    IngestStatus:
      type: string
      enum: [collected, duplicate, failed, pending_extract]
    EventStatus:
      type: string
      enum: [candidate, confirmed, rejected]
    FactStatus:
      type: string
      enum: [unverified, verified, disputed]
    EvidenceRelation:
      type: string
      enum: [supports, contradicts, context]
    TagKind:
      type: string
      enum: [news_category, index_category]
    TagAssignSource:
      type: string
      enum: [ai, rule]

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message, details]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
          description: 稳定 machine-readable error code。
        message:
          type: string
          minLength: 1
          maxLength: 500
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: false
      x-client-drift-anchor: data.v1.schema.ErrorEnvelope
      required: [error, request_id]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type: string
          minLength: 1
          maxLength: 128

    ResearchThemeImportRequest:
      type: object
      additionalProperties: false
