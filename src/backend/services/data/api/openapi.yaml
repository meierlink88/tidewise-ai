openapi: 3.0.3
info:
  title: Tidewise Data Service API
  version: 1.0.0
  description: >-
    Data Service 内部 HTTP REST + JSON 合同。消费方拥有小型手写 typed client，
    并以本文件的 operationId、schema drift anchor 和静态合同测试防止漂移。
x-contract-id: tidewise-data-v1
x-handwritten-client-policy: consumer-owned-small-typed-clients
servers:
  - url: /
    description: 由运行环境注入 Data Service origin；合同只冻结路径。
security:
  - ServiceBearer: []
tags:
  - name: Research
  - name: Admin aggregates
  - name: Agent source metadata
  - name: Raw document import
  - name: Reviewed event import
  - name: Research Theme import
  - name: Research Anchor import

paths:
  /internal/data/v1/research/themes:
    get:
      tags: [Research]
      operationId: listResearchThemes
      x-client-drift-anchor: data.v1.listResearchThemes
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Miniapp Research theme 页面聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/WindowHours'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Theme 页面聚合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
    get:
      tags: [Research]
      operationId: getResearchTheme
      x-client-drift-anchor: data.v1.getResearchTheme
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Research theme 及其证据聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/WindowHours'
      responses:
        '200':
          description: Theme 详情聚合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}/reasoning-trees:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
    get:
      tags: [Research]
      operationId: listResearchThemeReasoningTrees
      x-client-drift-anchor: data.v1.listResearchThemeReasoningTrees
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Theme 的全部推理树 Tab 摘要
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '200':
          description: Theme 摘要和完整推理树 Tab 集合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReasoningTreeListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research/themes/{theme_id}/reasoning-trees/{anchor_id}:
    parameters:
      - $ref: '#/components/parameters/ThemeID'
      - $ref: '#/components/parameters/AnchorID'
    get:
      tags: [Research]
      operationId: getResearchThemeReasoningTree
      x-client-drift-anchor: data.v1.getResearchThemeReasoningTree
      x-required-service-scope: data.research.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取一个 Theme 下的一棵完整推理树
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '200':
          description: 单棵推理树完整快照
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchReasoningTreeDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/admin/raw-documents:
    get:
      tags: [Admin aggregates]
      operationId: listAdminRawDocuments
      x-client-drift-anchor: data.v1.listAdminRawDocuments
      x-required-service-scope: data.admin.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Admin 原始文档分页聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          schema:
            type: string
            maxLength: 200
        - name: source_id
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - name: ingest_status
          in: query
          schema:
            $ref: '#/components/schemas/IngestStatus'
      responses:
        '200':
          description: 原始文档分页
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRawDocumentPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/admin/events:
    get:
      tags: [Admin aggregates]
      operationId: listAdminEvents
      x-client-drift-anchor: data.v1.listAdminEvents
      x-required-service-scope: data.admin.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Admin 全球事件分页聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          schema:
            type: string
            maxLength: 200
        - name: event_status
          in: query
          schema:
            $ref: '#/components/schemas/EventStatus'
        - name: fact_status
          in: query
          schema:
            $ref: '#/components/schemas/FactStatus'
        - name: event_time_from
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: event_time_to
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_from
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_to
          in: query
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
      responses:
        '200':
          description: 全球事件分页
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEventPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/admin/source-catalogs:
    get:
      tags: [Admin aggregates]
      operationId: listAdminSourceCatalogs
      x-client-drift-anchor: data.v1.listAdminSourceCatalogs
      x-required-service-scope: data.admin.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 Admin 搜索通道聚合
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/SourceStatus'
      responses:
        '200':
          description: 搜索通道集合
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSourceCatalogCollectionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/agent-run/source-metadata:
    get:
      tags: [Agent source metadata]
      operationId: listAgentSourceMetadata
      x-client-drift-anchor: data.v1.listAgentSourceMetadata
      x-required-service-scope: data.source-metadata.read
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 获取 agent-run 可见的脱敏来源元数据
      description: >-
        只返回批准的来源标识、adapter key、状态、限流提示、allowlisted 非敏感配置和
        credential_ref 名称；不返回 provider secret、token、cookie 或凭证值。
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/SourceStatus'
      responses:
        '200':
          description: caller scope 内可见的脱敏来源元数据
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSourceMetadataCollectionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/raw-document-imports:
    post:
      tags: [Raw document import]
      operationId: importRawDocuments
      x-client-drift-anchor: data.v1.importRawDocuments
      x-required-service-scope: data.raw-documents.import
      x-retry-policy: idempotent-with-key
      x-timeout-budget-ms: 15000
      x-canonicalization: raw-document-import-v1
      x-atomicity: whole-batch-single-postgresql-transaction
      x-receipt-schema: raw_document_import_receipts
      summary: 原子导入一个有界原始文档 batch
      description: >-
        caller_identity 只从认证 service principal 派生。服务端在任何业务 DML 前完成
        whole-batch validation，并在一个 PostgreSQL transaction 内提交全部 raw documents
        与独立 immutable receipt；不提供逐 item 部分成功。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/RawDocumentBatchImportRequest'
      responses:
        '200':
          description: 相同 caller/key/hash 的首次结果精确重放
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawDocumentImportEnvelope'
        '201':
          description: 全 batch 与 immutable receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawDocumentImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/raw-document-imports/{idempotency_key}:
    parameters:
      - name: idempotency_key
        in: path
        required: true
        description: 认证 caller scope 内的 raw import 幂等键。
        schema:
          type: string
          minLength: 1
          maxLength: 200
    get:
      tags: [Raw document import]
      operationId: getRawDocumentImportStatus
      x-client-drift-anchor: data.v1.getRawDocumentImportStatus
      x-required-service-scope: data.raw-documents.import
      x-retry-policy: safe-get
      x-timeout-budget-ms: 5000
      summary: 查询 caller-scoped raw import 的 unknown outcome
      description: >-
        可见 immutable receipt 表示 completed 并返回首次 stored result；缺行表示 unknown/
        尚未 commit。查询不得创建 placeholder、job、run 或内存状态。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      responses:
        '200':
          description: completed 或 unknown 状态
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawDocumentImportStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/reviewed-event-imports:
    post:
      tags: [Reviewed event import]
      operationId: importReviewedEvent
      x-client-drift-anchor: data.v1.importReviewedEvent
      x-required-service-scope: data.reviewed-events.import
      x-retry-policy: idempotent-with-key
      x-timeout-budget-ms: 15000
      x-canonicalization: reviewed-outbox-v1
      x-receipt-schema: event_import_receipts
      x-transaction-membership: raw-document,event,event-source,event-tag,event-import-receipt
      summary: 导入一个已审阅 event package
      description: >-
        保留既有 reviewed-outbox validation、canonical payload hash、review 状态、
        event_import_receipts 幂等和单 transaction 语义；不读写 raw_document_import_receipts。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewedEventImportRequest'
      responses:
        '200':
          description: 相同 key/hash 的既有 event receipt/result
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewedEventImportEnvelope'
        '201':
          description: Event package 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewedEventImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research-theme-imports:
    post:
      tags: [Research Theme import]
      operationId: importResearchThemes
      x-client-drift-anchor: data.v1.importResearchThemes
      x-required-service-scope: data.research.import
      x-retry-policy: idempotent-with-analysis-batch-id
      x-timeout-budget-ms: 15000
      x-canonicalization: rfc8785-sha256
      x-atomicity: whole-batch-single-postgresql-transaction
      x-receipt-schema: research_theme_import_receipts
      x-transaction-membership: research-theme-import-receipt,research-theme,research-theme-chain-node,research-theme-event
      summary: 原子发布一个不可变 Research Theme 批次快照
      description: >-
        analysis_batch_id 是唯一批次及幂等身份。发布者身份只从 Bearer service principal
        派生；同一主体、批次和 payload 重放首次结果，内容或主体冲突返回 409。
        themes、chain_nodes 和 events 必须按合同键升序提交，任一引用无效时整批回滚。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/ResearchThemeImportRequest'
      responses:
        '200':
          description: 相同发布主体、analysis_batch_id 与 payload 的首次结果重放
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeImportEnvelope'
        '201':
          description: Theme 批次和 immutable receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchThemeImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/data/v1/research-anchor-imports:
    post:
      tags: [Research Anchor import]
      operationId: importResearchAnchors
      x-client-drift-anchor: data.v1.importResearchAnchors
      x-required-service-scope: data.research.import
      x-retry-policy: idempotent-with-theme-id
      x-timeout-budget-ms: 15000
      x-canonicalization: rfc8785-sha256
      x-atomicity: whole-theme-single-postgresql-transaction
      x-receipt-schema: research_anchor_import_receipts
      x-transaction-membership: research-anchor-import-receipt,research-anchor,research-anchor-event,research-anchor-path-node
      summary: 原子发布一个 Theme 的完整 Research Anchor 推理树快照
      description: >-
        theme_id 是唯一幂等身份。发布主体必须与父 Theme Publication Receipt 一致；
        anchors 与 events 必须按合同键升序，path_nodes 顺序是业务事实。任一 Anchor、
        Event 或 Chain Node 引用无效时，整个 Theme 的 Anchor 集合回滚。
      parameters:
        - $ref: '#/components/parameters/RequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              maxLength: 1048576
              x-max-body-bytes: 1048576
              allOf:
                - $ref: '#/components/schemas/ResearchAnchorImportRequest'
      responses:
        '200':
          description: 相同发布主体、theme_id 与 payload 的首次结果重放
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAnchorImportEnvelope'
        '201':
          description: 完整 Anchor 集合和 immutable receipt 已原子提交
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchAnchorImportEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    ServiceBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque service identity token
      description: >-
        环境 secret 注入的 service identity。服务端从认证 principal 派生 caller identity
        与 scope；request body 不得声明或覆盖 caller identity。

  parameters:
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: 可选 caller request id；缺失时服务端生成。不得作为业务幂等 identity。
      schema:
        type: string
        minLength: 1
        maxLength: 128
    WindowHours:
      name: window_hours
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 168
        default: 24
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 2048
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    SourceStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SourceStatus'
    ThemeID:
      name: theme_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UUID'
    AnchorID:
      name: anchor_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UUID'

  headers:
    RequestID:
      description: 本次 transport attempt 的 request id；重放时可以与首次请求不同。
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128

  responses:
    BadRequest:
      description: 请求 DTO、query 或边界不合法
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: service bearer identity 缺失或无效
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 已认证 principal 不具有 operation 所需 scope
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: caller scope 内不存在目标资源
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: 幂等 key 与 payload hash 冲突或 raw identity 冲突；零 mutation
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PayloadTooLarge:
      description: JSON request body 超过 1048576 bytes
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: 已解析 DTO 未通过 whole-batch 业务 validation；零 mutation
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Data Service 内部错误
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    UUID:
      type: string
      format: uuid
      description: RFC 4122 UUID string。
    LowercaseUUID:
      type: string
      format: uuid
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      description: V1 publication contract 使用的标准小写 RFC 4122 UUID string。
    UTCTimestamp:
      type: string
      format: date-time
      description: UTC RFC3339 timestamp；response 必须使用 UTC offset Z。
    PayloadHash:
      type: string
      minLength: 64
      maxLength: 64
      pattern: '^[0-9a-f]{64}$'
      description: 服务端生成的 lowercase SHA-256 hex。
    SourceStatus:
      type: string
      enum: [active, inactive, disabled]
    IngestStatus:
      type: string
      enum: [collected, duplicate, failed, pending_extract]
    EventStatus:
      type: string
      enum: [candidate, confirmed, rejected]
    FactStatus:
      type: string
      enum: [unverified, verified, disputed]
    RawDocumentDisposition:
      type: string
      enum: [created, reused]
    EvidenceRelation:
      type: string
      enum: [supports, contradicts, context]
    TagKind:
      type: string
      enum: [news_category, index_category]
    TagReviewStatus:
      type: string
      enum: [approved, pending, rejected]
    TagAssignSource:
      type: string
      enum: [ai, rule]
    ReviewDecision:
      type: string
      enum: [auto_approved, pending_evidence, manual_review, rejected]

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message, details]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
          description: 稳定 machine-readable error code。
        message:
          type: string
          minLength: 1
          maxLength: 500
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: false
      x-client-drift-anchor: data.v1.schema.ErrorEnvelope
      required: [error, request_id]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type: string
          minLength: 1
          maxLength: 128

    ResearchThemeImportRequest:
      type: object
      additionalProperties: false
      x-client-drift-anchor: data.v1.schema.ResearchThemeImportRequest
      required: [analysis_batch_id, window_start, window_end, themes]
      properties:
        analysis_batch_id:
          type: string
          minLength: 1
          maxLength: 200
          description: 分析侧 run_id；同时是不可变批次身份与唯一幂等身份。
        window_start:
          $ref: '#/components/schemas/UTCTimestamp'
        window_end:
          allOf:
            - $ref: '#/components/schemas/UTCTimestamp'
          description: 必须严格晚于 window_start。
        themes:
          type: array
          minItems: 1
          description: 必须按 theme_key ASCII 升序且批次内唯一。
