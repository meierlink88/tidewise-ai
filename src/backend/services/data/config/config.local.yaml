app:
  name: data
  env: local
server:
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 5
  write_timeout_seconds: 15
log:
  level: debug
database:
  host: postgres
  port: 5432
  name: tidewise_local
  user: tidewise
  ssl_mode: disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_seconds: 300
  connect_timeout_seconds: 5
neo4j:
  enabled: true
  uri: bolt://neo4j:7687
  database: neo4j
  username_env: NEO4J_USERNAME
  password_env: NEO4J_PASSWORD
  connect_timeout_seconds: 5
  max_connection_pool_size: 10
migration:
  directory: migrations
  auto_apply: false
  lock_key: tidewise_schema_migration
