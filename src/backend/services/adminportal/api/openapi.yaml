openapi: 3.0.4
info:
  title: Tidewise Admin Portal Service API
  version: 1.0.0
  description: Admin Portal BFF 的手写 REST + JSON 合同。
servers:
  - url: /
    description: 由运行环境注入 Admin Portal Service origin。
security:
  - AdminBearer: []
tags:
  - name: Operations
  - name: Admin data
paths:
  /healthz:
    get:
      tags: [Operations]
      operationId: getAdminPortalHealth
      summary: Admin Portal Service 存活检查
      security: []
      responses:
        '200':
          description: 进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Operations]
      operationId: getAdminPortalReadiness
      summary: Admin Portal Service 就绪检查
      security: []
      responses:
        '200':
          description: 服务配置就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/admin/v1/raw-documents:
    get:
      tags: [Admin data]
      operationId: listAdminPortalRawDocuments
      summary: 获取已接纳的轻量证据文档分页
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          required: false
          schema:
            type: string
        - name: source_ref
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/RawDocumentPageSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/admin/v1/events:
    get:
      tags: [Admin data]
      operationId: listAdminPortalEvents
      summary: 获取正式 Event 分页
      parameters:
        - $ref: '#/components/parameters/RequestID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: title
          in: query
          required: false
          schema:
            type: string
        - name: event_status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EventStatus'
        - name: fact_status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/FactStatus'
        - name: event_time_from
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: event_time_to
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_from
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
        - name: first_seen_to
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UTCTimestamp'
      responses:
        '200':
          $ref: '#/components/responses/EventPageSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque admin service token
      description: 由运行环境 secret 注入；Swagger UI 不保存或内置 token。
  parameters:
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: 可选 caller request id；缺失或不合法时由 Admin Portal Service 生成。
      schema:
        type: string
        minLength: 1
        maxLength: 128
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
  headers:
    RequestID:
      required: true
      description: 与响应 body 中 request_id 一致。
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    RawDocumentPageSuccess:
      description: 轻量证据文档分页
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RawDocumentPageEnvelope'
    EventPageSuccess:
      description: Event 分页
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EventPageEnvelope'
    BadRequest:
      description: 查询参数不合法
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Admin bearer token 缺失或无效
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 调用来源不被允许
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Admin Portal Service 内部错误
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: Admin Portal Service 尚未完成运行配置
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    UTCTimestamp:
      type: string
      format: date-time
      description: UTC RFC3339 timestamp。
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, environment]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        environment:
          type: string
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [status, service, environment, checks]
      properties:
        status:
          type: string
          enum: [ready]
        service:
          type: string
        environment:
          type: string
        checks:
          type: object
          additionalProperties:
            type: string
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error, request_id]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type: string
    RawDocumentPageEnvelope:
      type: object
      additionalProperties: false
      required: [request_id, result]
      properties:
        request_id:
          type: string
        result:
          $ref: '#/components/schemas/RawDocumentPage'
    EventPageEnvelope:
      type: object
      additionalProperties: false
      required: [request_id, result]
      properties:
        request_id:
          type: string
        result:
          $ref: '#/components/schemas/EventPage'
    RawDocumentPage:
      type: object
      additionalProperties: false
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RawDocument'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
    RawDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - contract_version
        - ingest_channel
        - source_type
        - source_name
        - source_url
        - title
        - content_text
        - raw_object_uri
        - raw_mime_type
        - language
        - collected_at
        - ingest_status
        - content_sha256
      properties:
        id:
          type: string
        contract_version:
          type: integer
        artifact_id:
          type: string
        source_ref:
          type: string
        ingest_channel:
          type: string
        source_type:
          type: string
        source_name:
          type: string
        source_url:
          type: string
          format: uri
        source_external_id:
          type: string
        title:
          type: string
        content_text:
          type: string
        raw_object_uri:
          type: string
        raw_mime_type:
          type: string
        language:
          type: string
        published_at:
          $ref: '#/components/schemas/UTCTimestamp'
        collected_at:
          $ref: '#/components/schemas/UTCTimestamp'
        ingest_status:
          type: string
        content_sha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
    EventPage:
      type: object
      additionalProperties: false
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
    Event:
      type: object
      additionalProperties: false
      required: [id, title, summary, first_seen_at, event_status, fact_status, dedupe_key]
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        event_time:
          $ref: '#/components/schemas/UTCTimestamp'
        first_seen_at:
          $ref: '#/components/schemas/UTCTimestamp'
        knowable_at:
          $ref: '#/components/schemas/UTCTimestamp'
        event_status:
          $ref: '#/components/schemas/EventStatus'
        fact_status:
          $ref: '#/components/schemas/FactStatus'
        dedupe_key:
          type: string
        primary_source_id:
          type: string
    EventStatus:
      type: string
      enum: [candidate, confirmed, rejected]
    FactStatus:
      type: string
      enum: [unverified, verified, disputed]
