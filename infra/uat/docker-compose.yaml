name: tidewise-uat

services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: uat
      TIDEWISE_CONFIG_DIR: /app/config
      TIDEWISE_DATABASE_URL: ${TIDEWISE_DATABASE_URL:-}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      AGENT_PLATFORM_API_KEY: ${AGENT_PLATFORM_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      PAYMENT_SECRET: ${PAYMENT_SECRET:-}
      CLOUD_SECRET: ${CLOUD_SECRET:-}
    ports:
      - "${BACKEND_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tidewise-uat

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required}
    restart: unless-stopped
    environment:
      ADMIN_API_UPSTREAM: ${ADMIN_API_UPSTREAM:-http://backend:8080}
    ports:
      - "${ADMIN_HTTP_PORT:-8081}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tidewise-uat

networks:
  tidewise-uat:
    name: tidewise-uat
