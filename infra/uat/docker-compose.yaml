name: tidewise-uat

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  data:
    image: ${DATA_IMAGE:?DATA_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: uat
      TIDEWISE_CONFIG_DIR: /app/config
      TIDEWISE_DATABASE_URL: ${TIDEWISE_DATABASE_URL:?TIDEWISE_DATABASE_URL is required}
      DATA_SERVICE_AGENT_TOKEN: ${DATA_SERVICE_AGENT_TOKEN:?DATA_SERVICE_AGENT_TOKEN is required}
      DATA_SERVICE_RESEARCH_PUBLISHER_TOKEN: ${DATA_SERVICE_RESEARCH_PUBLISHER_TOKEN:?DATA_SERVICE_RESEARCH_PUBLISHER_TOKEN is required}
      DATA_SERVICE_MINIAPP_TOKEN: ${DATA_SERVICE_MINIAPP_TOKEN:?DATA_SERVICE_MINIAPP_TOKEN is required}
      DATA_SERVICE_ADMIN_TOKEN: ${DATA_SERVICE_ADMIN_TOKEN:?DATA_SERVICE_ADMIN_TOKEN is required}
    expose:
      - "9011"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9011/readyz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging: *default-logging
    networks: [tidewise-uat]

  miniapp:
    image: ${MINIAPP_IMAGE:?MINIAPP_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: uat
      TIDEWISE_CONFIG_DIR: /app/config
      DATA_SERVICE_BASE_URL: http://data:9011
      DATA_SERVICE_MINIAPP_TOKEN: ${DATA_SERVICE_MINIAPP_TOKEN:?DATA_SERVICE_MINIAPP_TOKEN is required}
    ports:
      - "9012:9012"
    depends_on:
      data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9012/readyz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging: *default-logging
    networks: [tidewise-uat]

  adminportal:
    image: ${ADMINPORTAL_IMAGE:?ADMINPORTAL_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: uat
      TIDEWISE_CONFIG_DIR: /app/config
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      ADMIN_ALLOWED_ORIGIN: ${ADMIN_ALLOWED_ORIGIN:?ADMIN_ALLOWED_ORIGIN is required}
      DATA_SERVICE_BASE_URL: http://data:9011
      DATA_SERVICE_ADMIN_TOKEN: ${DATA_SERVICE_ADMIN_TOKEN:?DATA_SERVICE_ADMIN_TOKEN is required}
    ports:
      - "9013:9013"
    depends_on:
      data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9013/readyz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging: *default-logging
    networks: [tidewise-uat]

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required}
    restart: unless-stopped
    environment:
      ADMIN_API_BASE_URL: ${ADMIN_API_BASE_URL:?ADMIN_API_BASE_URL is required}
    ports:
      - "9014:9014"
    depends_on:
      adminportal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9014/healthz"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging: *default-logging
    networks: [tidewise-uat]

networks:
  tidewise-uat:
    name: tidewise-uat
