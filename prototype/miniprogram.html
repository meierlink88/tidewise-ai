<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>观潮家 · 微信小程序原型</title>
<link rel="stylesheet" href=".design_library/观潮家/colors_and_type.css">
<link rel="stylesheet" href=".design_library/观潮家/components.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    /* 观潮语义色：红涨 / 绿跌 / 橙中性 */
    --tone-up: var(--tide-red-700);
    --tone-up-soft: var(--tide-red-50);
    --tone-down: var(--tide-green-700);
    --tone-down-soft: var(--tide-green-50);
    --tone-neutral: var(--tide-amber-700);
    --tone-neutral-soft: var(--tide-amber-50);
  }
  body {
    font-family: var(--font-body);
    background: #e8ecf2;
    color: var(--foreground);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .prototype-shell {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    padding: 32px 24px 48px;
    min-height: 100vh;
  }
  .annotation-panel {
    width: 280px;
    padding-top: 60px;
    flex-shrink: 0;
  }
  .annotation-panel h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .annotation-panel p,
  .annotation-panel li {
    font-size: 12px;
    line-height: 1.7;
    color: var(--muted-foreground);
  }
  .annotation-panel ul { padding-left: 16px; margin-bottom: 20px; }
  .annotation-panel .tag {
    display: inline-block;
    background: var(--tide-blue-50);
    color: var(--primary);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  @media (max-width: 860px) {
    .annotation-panel { display: none; }
    .prototype-shell { padding: 12px; }
  }

  .phone-frame {
    width: 375px;
    height: 812px;
    background: var(--bg);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px #d1d5db, 0 24px 64px rgba(15,23,42,0.14);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    font-family: var(--font-body);
  }
  .phone-frame.shell-home {
    background-color: var(--surface-hero);
    background-image:
      radial-gradient(circle at 78% 2%, rgba(201,169,98,.16), transparent 28%),
      radial-gradient(circle at 6% 22%, rgba(142,164,181,.12), transparent 32%),
      repeating-linear-gradient(162deg, transparent 0 22px, rgba(216,193,138,.035) 23px, transparent 24px 46px),
      linear-gradient(155deg, var(--surface-hero-soft) 0%, var(--surface-hero) 52%, #081826 100%);
    background-size: auto;
    background-position: center;
    background-repeat: no-repeat;
  }

  .wx-status-bar {
    height: 44px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 6px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-mono);
    flex-shrink: 0;
    background: var(--bg);
    transition: background 0.2s, color 0.2s;
  }
  .wx-status-icons {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
  }
  .shell-home .wx-status-bar,
  .mode-ai .wx-status-bar,
  .mode-profile .wx-status-bar {
    background: transparent;
    color: rgba(255,255,255,0.92);
  }
  .shell-home .wx-nav-bar,
  .mode-ai .wx-nav-bar,
  .mode-profile .wx-nav-bar {
    background: transparent;
  }
  .shell-home .wx-nav-title,
  .mode-ai .wx-nav-title,
  .mode-profile .wx-nav-title {
    color: #ffffff;
    text-shadow: 0 1px 8px rgba(57,108,148,0.25);
  }
  .shell-home .wx-capsule,
  .mode-ai .wx-capsule,
  .mode-profile .wx-capsule {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.42);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 10px rgba(57,108,148,0.16);
  }
  .shell-home .wx-capsule-dot,
  .shell-home .wx-capsule-close,
  .mode-ai .wx-capsule-dot,
  .mode-ai .wx-capsule-close,
  .mode-profile .wx-capsule-dot,
  .mode-profile .wx-capsule-close {
    color: #ffffff;
  }
  .shell-home .wx-capsule-divider,
  .mode-ai .wx-capsule-divider,
  .mode-profile .wx-capsule-divider {
    background: rgba(255,255,255,0.35);
  }

  .wx-nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    background: var(--bg);
    transition: background 0.2s;
  }
  .wx-nav-title {
    font-size: 16px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .wx-capsule {
    position: absolute;
    right: 7px;
    top: 50%;
    transform: translateY(-50%);
    width: 87px;
    height: 32px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    background: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .wx-capsule-dot,
  .wx-capsule-close {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--foreground);
  }
  .wx-capsule-dot { font-size: 16px; letter-spacing: 1px; }
  .wx-capsule-close { font-size: 14px; }
  .wx-capsule-divider {
    width: 1px;
    height: 18px;
    background: rgba(0,0,0,0.12);
  }

  .screen-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .screen {
    display: none;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.28s ease;
    pointer-events: none;
  }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active {
    display: block;
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }
  .screen.screen-leaving {
    display: block;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }
  #screen-home.active,
  #screen-home.screen-leaving,
  #screen-ai.active,
  #screen-ai.screen-leaving,
  #screen-profile.active,
  #screen-profile.screen-leaving,
  #screen-analysis.active,
  #screen-analysis.screen-leaving,
  #screen-history.active,
  #screen-history.screen-leaving {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #screen-ai,
  #screen-profile {
    height: 100%;
    background: transparent;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .tab-bar-wrap { display: none; }
  .tab-bar { display: none; }
  .tab-item { display: none; }

  .composer-dock {
    flex-shrink: 0;
    padding: 6px 14px 0;
    background: #ffffff;
    position: relative;
    z-index: 8;
    display: none;
  }
  .phone-frame.mode-ai .composer-dock {
    display: block;
  }
  .phone-frame.mode-ai .composer-hint {
    color: var(--tide-gray-400);
    text-shadow: none;
  }
  .composer-dock-inner {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 6px 6px 14px;
    border-radius: 24px;
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(255,255,255,0.85);
    box-shadow:
      0 2px 8px rgba(0,0,0,0.12),
      0 12px 28px -10px rgba(0,0,0,0.35);
    width: 100%;
    max-width: 100%;
    margin-left: auto;
    overflow: hidden;
  }
  .phone-frame.mode-ai .composer-dock-inner,
  .composer-dock-inner:focus-within {
    box-shadow:
      0 1px 4px rgba(0,0,0,0.1),
      0 8px 20px -8px rgba(0,0,0,0.28),
      0 0 0 2px rgba(56,189,248,0.28);
  }
  .composer-ai-mark {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, var(--tide-blue-700) 0%, var(--tide-blue-900) 100%);
    color: #fff;
    box-shadow: 0 2px 8px rgba(14,165,233,0.35);
  }
  .composer-ai-mark svg { width: 14px; height: 14px; }
  .composer-input {
    flex: 1;
    min-width: 0;
    height: 36px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--tide-gray-800);
    transition: opacity 0.2s ease;
  }
  .composer-input::placeholder { color: var(--tide-gray-400); }
  .composer-send {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
  }
  .composer-send:active { transform: scale(0.94); }
  .composer-send svg { width: 16px; height: 16px; }
  .composer-hint {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    padding: 5px 8px 2px;
    transition: opacity 0.2s ease;
    text-shadow: 0 1px 4px rgba(57,108,148,0.25);
  }
  .phone-frame.mode-profile .composer-dock {
    display: none;
  }
  .safe-area-bottom {
    height: 12px;
    background: transparent;
  }

  .home-composer-dock {
    display: none;
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 12;
    padding: 6px 14px 0;
    background: transparent;
    pointer-events: none;
  }
  .phone-frame.shell-home:not(.mode-ai):not(.mode-profile) .home-composer-dock {
    display: none;
  }
  .phone-frame.has-sheet .home-composer-dock,
  .phone-frame.has-sheet .composer-dock {
    display: none !important;
  }
  .home-composer-dock .composer-hint {
    color: var(--tide-gray-400);
    text-shadow: none;
    pointer-events: none;
  }
  .home-composer-dock .composer-dock-inner.home-composer-send-only {
    justify-content: flex-end;
    width: auto;
    margin-left: auto;
    padding: 6px;
    background: transparent;
    border: none;
    box-shadow: none;
    pointer-events: auto;
  }
  .home-composer-dock .composer-dock-inner.home-composer-send-only .composer-send {
    box-shadow:
      0 4px 14px rgba(14,165,233,0.42),
      0 2px 6px rgba(15,23,42,0.14);
    border: 2px solid rgba(255,255,255,0.92);
  }

  .nav-avatar {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.85);
    background: #dbeafe;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 2px 10px rgba(15,23,42,0.18);
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
    overflow: hidden;
  }
  .nav-avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
  }
  .nav-avatar svg {
    width: 16px;
    height: 16px;
    display: block;
  }
  .nav-avatar:active { transform: translateY(-50%) scale(0.94); }
  .nav-avatar.is-guest {
    background: #dbeafe;
    border-color: rgba(255,255,255,0.85);
  }
  .phone-frame.mode-ai .nav-avatar,
  .phone-frame.mode-profile .nav-avatar {
    display: none;
  }
  .nav-back-btn {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.98);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-back-btn svg {
    width: 18px;
    height: 18px;
    display: block;
  }
  .nav-back-btn:active {
    transform: translateY(-50%) scale(0.94);
    background: rgba(255,255,255,0.2);
  }
  .phone-frame.mode-ai .nav-back-btn,
  .phone-frame.mode-profile .nav-back-btn {
    display: inline-flex;
  }

  .home-content {
    min-height: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }
  .home-brief-panel {
    margin: 0;
    padding: 2px 16px 6px;
    background: transparent;
    border-radius: 0;
    box-shadow: none;
    flex-shrink: 0;
    min-height: 0;
    overflow: visible;
  }
  .home-brief-toggle {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -40%);
    z-index: 3;
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid rgba(14,165,233,0.35);
    background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
    box-shadow: 0 1px 6px rgba(14,165,233,0.16);
    color: var(--primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .home-brief-toggle:active {
    transform: translate(-50%, -40%) scale(0.94);
    background: #dbeafe;
    box-shadow: 0 1px 4px rgba(14,165,233,0.12);
  }
  .home-brief-toggle-icon {
    width: 11px;
    height: 11px;
    transition: transform 0.25s ease;
  }
  .home-brief-toggle-icon.is-collapsed {
    transform: rotate(180deg);
  }
  .home-content.home-brief-collapsed .daily-brief-extra {
    display: none;
  }
  .home-content.home-brief-collapsed .daily-brief-conclusion {
    margin-bottom: 0;
  }
  .home-content.home-brief-collapsed .daily-brief-footer {
    margin-top: 10px;
    padding-top: 8px;
  }
  .home-event-section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #ffffff;
    margin-top: -1px;
    padding-bottom: 0;
  }

  /* ── 数据更新 · 今日预判 ── */
  .daily-brief {
    margin: 0;
    border-radius: 0;
    position: relative;
    overflow: visible;
    padding: 0;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    box-shadow: none;
  }
  .daily-brief-bg { display: none; }
  .daily-brief-inner {
    position: relative;
    z-index: 1;
    padding: 0;
    text-align: left;
  }
  .capture-progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 2px 8px;
  }
  .capture-progress-ring {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .capture-progress-ring circle {
    fill: none;
    stroke-width: 3;
  }
  .capture-progress-ring .track {
    stroke: rgba(255,255,255,0.35);
  }
  .capture-progress-ring .bar {
    stroke: #ffffff;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
  }
  .capture-progress-date {
    flex: 1;
    min-width: 0;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 8px rgba(12,48,90,0.35);
  }
  .capture-progress-date-prefix {
    font-weight: 700;
    margin-right: 4px;
  }
  .capture-progress-meta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .capture-progress-time {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.88);
    letter-spacing: -0.01em;
    text-shadow: 0 1px 6px rgba(12,48,90,0.28);
    white-space: nowrap;
  }
  .daily-brief-conclusion {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    margin-bottom: 6px;
    padding-bottom: 0;
    border-bottom: none;
  }
  .conclusion-kpi {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    padding: 0 16px;
    border-radius: 0;
    background: transparent;
    border: none;
    overflow: visible;
  }
  .conclusion-kpi + .conclusion-kpi {
    border-left: 1px solid rgba(14,165,233,0.1);
  }
  .conclusion-kpi-inner {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
  }
  .conclusion-kpi::before {
    display: none;
  }
  .conclusion-kpi-label {
    display: inline;
    font-size: 11px;
    font-weight: 500;
    color: var(--tide-gray-500);
    letter-spacing: 0;
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .conclusion-kpi-value-wrap {
    position: relative;
    display: inline-flex;
    align-items: flex-start;
    padding-right: 6px;
  }
  .conclusion-kpi-value {
    display: inline;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--tide-gray-800);
    white-space: nowrap;
    padding-right: 2px;
  }
  .conclusion-hint-btn {
    position: absolute;
    top: -4px;
    right: -8px;
    width: 11px;
    height: 11px;
    padding: 0;
    border: 1px solid rgba(14,165,233,0.28);
    border-radius: 50%;
    background: var(--tide-sky-100);
    color: var(--tide-sky-700);
    font-size: 8px;
    font-weight: 700;
    font-family: var(--font-body);
    line-height: 10px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(14,165,233,0.12);
    -webkit-tap-highlight-color: transparent;
  }
  .conclusion-hint-btn:active {
    background: var(--tide-sky-50);
    transform: scale(0.92);
  }
  .conclusion-kpi.bias-divergent .conclusion-hint-btn,
  .conclusion-kpi.sentiment-cautious .conclusion-hint-btn {
    background: var(--tone-neutral-soft);
    color: var(--tone-neutral);
    border-color: rgba(217,119,6,0.28);
    box-shadow: 0 1px 3px rgba(217,119,6,0.12);
  }
  .conclusion-kpi.bias-divergent .conclusion-hint-btn:active,
  .conclusion-kpi.sentiment-cautious .conclusion-hint-btn:active {
    background: var(--tide-amber-100);
  }
  .conclusion-kpi.bias-bullish .conclusion-kpi-value { color: var(--tone-up); }
  .conclusion-kpi.bias-bearish .conclusion-kpi-value { color: var(--tone-down); }
  .conclusion-kpi.bias-divergent .conclusion-kpi-value { color: var(--tone-neutral); }
  .conclusion-kpi.sentiment-cautious .conclusion-kpi-value { color: var(--tone-neutral); }
  .conclusion-kpi.sentiment-defensive .conclusion-kpi-value { color: var(--tone-down); }
  .conclusion-kpi.sentiment-optimistic .conclusion-kpi-value { color: var(--tone-up); }
  .conclusion-kpi.sentiment-risk_on .conclusion-kpi-value { color: var(--tone-neutral); }
  .daily-brief-focus {
    position: relative;
    border-radius: 18px;
    padding: 10px 14px 9px;
    background: linear-gradient(180deg, #ffffff 0%, #f7fbfe 55%, #eef5fb 100%);
    border: 1px solid rgba(255,255,255,0.92);
    box-shadow:
      0 1px 2px rgba(57,108,148,0.08),
      0 14px 32px -12px rgba(57,108,148,0.28);
    margin-bottom: 0;
  }
  .daily-brief-news {
    margin-top: 0;
  }
  .daily-brief-lead-inline {
    font-size: 12px;
    font-weight: 600;
    color: var(--tide-sky-700);
    margin-right: 6px;
  }
  .daily-brief-headline {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--tide-gray-700);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .daily-brief-focus-themes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 7px;
  }
  .daily-brief-footer {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(15,23,42,0.08);
  }
  .daily-brief-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 100%;
    padding: 0;
    background: transparent;
    border: none;
  }
  .brief-stat {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: var(--tide-gray-500);
    white-space: nowrap;
  }
  .brief-stat strong {
    font-weight: 700;

  .overlay-mask {

  .hint-popover {
    display: none;
    position: absolute;
    z-index: 102;
    width: max-content;
    min-width: 168px;
    max-width: 252px;
    background: linear-gradient(180deg, #dceaf5 0%, #eaf2f9 55%, #f8fbfd 100%);
    border: 1px solid rgba(14,165,233,0.12);
    border-radius: 12px;
    box-shadow: 0 8px 24px -10px rgba(14,165,233,0.2), 0 2px 6px rgba(15,23,42,0.05);
    pointer-events: auto;
    overflow: visible;
  }
  .hint-popover.show {
    display: block;
    animation: hintPopIn 0.18s ease;
  }
  @keyframes hintPopIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hint-popover::before {
    content: '';
    position: absolute;
    top: -5px;
    left: var(--hint-arrow-left, 50%);
    width: 10px;
    height: 10px;
    background: #dceaf5;
    border-left: 1px solid rgba(14,165,233,0.12);
    border-top: 1px solid rgba(14,165,233,0.12);
    transform: translateX(-50%) rotate(45deg);
    border-radius: 2px 0 0 0;

function thesisArrow(direction) {
  return direction === 'up' ? '↑' : direction === 'down' ? '↓' : '→';
}

function formatThesisLine(thesis) {
  const shortArrow = thesisArrow(thesis.short.direction);
  const longArrow = thesisArrow(thesis.long.direction);
  return {
    shortText: `短期 ${shortArrow} ${thesis.short.text}`,
    longText: `长期 ${longArrow} ${thesis.long.text}`,
    shortClass: thesis.short.direction,
    longClass: thesis.long.direction,
    shortMetric: thesis.short.metric || '',
    longMetric: thesis.long.metric || '',
    shortBody: thesis.short.text,
    longBody: thesis.long.text,
  };
}

function parseImpactMetricValue(metric) {
  if (!metric) return 0;
  const m = String(metric).replace(/[^0-9.-]/g, '');
  return Math.abs(parseFloat(m) || 0);
}

function getImpactHorizon(t, horizon) {
  if (t[horizon]) return t[horizon];
  if (horizon === 'short') {
    return { direction: t.direction || 'neutral', text: t.conclusion || '', metric: t.shortChange || '' };
  }
  return { direction: t.longDirection || t.direction || 'neutral', text: t.conclusion || '', metric: t.longChange || '' };
}

function getImpactTargetScore(t) {
  if (typeof t.impactScore === 'number') return t.impactScore;
  const s = parseImpactMetricValue(getImpactHorizon(t, 'short').metric);
  const l = parseImpactMetricValue(getImpactHorizon(t, 'long').metric);
  return Math.max(s, l);
}

function sortImpactTargets(targets) {
  if (!targets || !targets.length) return [];
  return [...targets].sort((a, b) => getImpactTargetScore(b) - getImpactTargetScore(a));
}

function getImpactTargetTypeLabel(t) {
  if (t.watchMeta?.typeLabel) return t.watchMeta.typeLabel;
  if (t.type === 'sector') return '板块';
  if (t.type === 'stock') return '个股';
  if (t.type === 'fx') return '汇率';
  if (t.type === 'asset') return '商品';
  return '标的';
}

function renderTargetHorizonBoxes(t) {
  const short = getImpactHorizon(t, 'short');
  const long = getImpactHorizon(t, 'long');
  const box = (label, h) => `
    <div class="event-thesis-box ${h.direction || 'neutral'}">
      <span class="event-thesis-box-label">${label}</span>
      ${h.metric ? `<span class="event-thesis-box-metric">${thesisArrow(h.direction)} ${h.metric}</span>` : ''}
      <div class="event-thesis-box-text">${h.text || ''}</div>
    </div>
  `;
  return `<div class="event-thesis-dual">${box('短期', short)}${box('长期', long)}</div>`;
}

}

function renderImpactTargetCards(ev, limit = 3, options = {}) {
  const { showMore = true, label = '核心影响' } = options;
  if (!ev.impactTargets || !ev.impactTargets.length) return '';
  const sorted = sortImpactTargets(ev.impactTargets);
  const shown = limit >= sorted.length ? sorted : sorted.slice(0, limit);
  const extra = sorted.length - shown.length;
  return `
    <div class="impact-targets-section-card" onclick="event.stopPropagation()">
      ${label ? `<div class="impact-targets-label">${label}</div>` : ''}
      <div class="impact-target-cards">
        ${shown.map(t => renderImpactTargetCard(t, ev.id)).join('')}
      </div>
      ${showMore && extra > 0 ? `<button type="button" class="impact-target-more-link" onclick="event.stopPropagation(); openEventDetail('${ev.id}')">还有 ${extra} 个标的 · 查看全部</button>` : ''}
    </div>
  `;
}

function toggleWatchTarget(watchId, judgmentId) {
  if (!requireLogin(
    () => toggleWatchTarget(watchId, judgmentId),
    '确认手机号后，即可同步跟踪状态与提醒'
  )) return;
  let w = getWatchById(watchId);
  if (!w) {
    const ev = getEventById(judgmentId);
    const impact = ev && ev.impactTargets.find(t => t.watchId === watchId);
    if (!impact) return;
    w = {
      id: watchId,
      type: impact.type,
      typeLabel: impact.watchMeta?.typeLabel || (impact.type === 'sector' ? '板块' : impact.type === 'stock' ? '个股' : '标的'),
      name: impact.name,
      latest: impact.short?.metric || impact.shortChange,
      change: impact.long?.metric || impact.longChange,
      changeDir: impact.short?.direction || impact.direction,
      note: impact.watchMeta?.note || `来自${ev.narrativeTitle}`,
      judgmentIds: [judgmentId],
      watching: true,
    };
    MOCK.dailyBrief.watchTargets.push(w);
  } else {
    w.watching = !w.watching;
    if (judgmentId && w.judgmentIds && !w.judgmentIds.includes(judgmentId)) {
      w.judgmentIds.push(judgmentId);
    }
  }
  syncWatchStats();
  renderHome();
  if (currentMode === 'analysis' && analysisStoryState.eventId === judgmentId) {
    renderAnalysisStory();
  }
  if (profileTrackTab === 'target') renderMicroTracking();
}

  const target = ev.impactTargets.find(t => t.type === 'stock' && t.name === companyName);
  return target?.watchId || null;
}

function getCompanyDisplayInfo(company, judgmentId, ic) {
  const name = typeof company === 'object' ? company.name : company;
  const jCompany = ic?.judgment?.companies?.find(c => c.name === name);
  const ev = getEventById(judgmentId);
  const stockTarget = ev?.impactTargets?.find(t => t.name === name);
  const presetWatch = getWatchById((typeof company === 'object' && company.watchId) || stockTarget?.watchId || jCompany?.watchId);
  return {
    name,
    role: (typeof company === 'object' && company.role) || jCompany?.role || stockTarget?.conclusion || '',
    watchId: (typeof company === 'object' && company.watchId) || presetWatch?.id || stockTarget?.watchId || jCompany?.watchId || null,
  };
}

function refreshIndustryChainPageIfOpen() {
  const overlay = document.getElementById('industryChainOverlay');
  if (!overlay?.classList.contains('show')) return;
  const body = document.getElementById('industryChainBody');
  const judgmentId = body.dataset.judgmentId;
  const chainId = body.dataset.chainId || '';
  if (judgmentId) body.innerHTML = renderIndustryChainPage(judgmentId, chainId);
}

function getLayerWatchId(layer, judgmentId, ic) {
  for (const company of (layer.companies || [])) {
    const c = getCompanyDisplayInfo(company, judgmentId, ic);
    if (c.watchId) return c.watchId;
  }
  const ev = getEventById(judgmentId);
  for (const tid of (layer.targetIds || [])) {
    const t = ev?.impactTargets?.find(x => x.id === tid);
    if (t?.watchId) return t.watchId;
  }
  return null;
}

function renderLayerWatchBtn(layer, judgmentId, ic) {
  const watchId = getLayerWatchId(layer, judgmentId, ic);
  if (!watchId) return '<span class="ic-layer-watch-spacer" aria-hidden="true"></span>';
  const watching = isWatching(watchId);
  return `<button type="button" class="ic-layer-watch stage-${layer.stage}${watching ? ' is-watching' : ''}" onclick="event.stopPropagation(); toggleWatchTarget('${watchId}', '${judgmentId}'); refreshIndustryChainPageIfOpen()">${watching ? '跟踪中' : '+ 跟踪'}</button>`;
}

      </div>`;
  }).join('');
  return `<div class="ic-layer-reps"><div class="ic-company-grid">${chips}</div></div>`;
}

function getLayerAnalysis(layer, ic) {
  if (layer.analysis) return layer.analysis;
  const j = ic.judgment;
  const fromNodes = (layer.nodes || []).slice(0, 2).map(n =>
    `${n.name}缺口${n.gap || '—'}，价格变动${n.priceChange || '—'}`

  return {
    title: j?.title ? `${layer.name}·${j.title}` : `${layer.name}阶段判断`,
    bullets: fromNodes.length ? fromNodes : (j?.bullets?.slice(0, 2) || []),

function getPhaseStage(ic, phase) {
  const layerId = phase.layerIds?.[0];
  const layer = layerId ? getIndustryChainLayer(ic, layerId) : null;
  return layer?.stage || 'building';
}

function getTimelineNodePosClass(index, total) {
  if (total <= 1) return 'pos-mid';
  if (index === 0) return 'pos-first';
  if (index === total - 1) return 'pos-last';
  return 'pos-mid';
}

function buildTimelineTrackGradient(phases, ic) {
  const stageColor = {
    ignited: 'rgba(239,68,68,0.55)',
    igniting: 'rgba(249,115,22,0.55)',
    building: 'rgba(14,165,233,0.55)',
  };
  if (phases.length === 1) {
    const stage = getPhaseStage(ic, phases[0]);
    return stageColor[stage] || stageColor.building;
  }
  const stops = phases.map((phase, i) => {
    const stage = getPhaseStage(ic, phase);
    const pct = (i / (phases.length - 1)) * 100;
    return `${stageColor[stage] || stageColor.building} ${pct}%`;
  });
  return `linear-gradient(90deg, ${stops.join(', ')})`;
}

function renderIndustryChainLayers(ic, judgmentId, activeLayerId) {
  const activeId = activeLayerId || ic.activeLayerId;
  const activeLayer = getIndustryChainLayer(ic, activeId) || ic.layers[0];

function renderIndustryChainTimeline(ic, activePhaseId) {
  if (!ic.timeline?.length) return '';
  const activeId = activePhaseId || ic.activePhaseId;
  const trackBg = buildTimelineTrackGradient(ic.timeline, ic);
  const total = ic.timeline.length;
  const renderPhase = (phase, i, band) => {
    const stage = getPhaseStage(ic, phase);
    const posClass = getTimelineNodePosClass(i, total);
    const activeClass = phase.id === activeId ? ' is-active' : '';
    if (band === 'dots') {
      return `<div class="ic-timeline-dot-wrap ${posClass} stage-${stage}${activeClass}" onclick="highlightIndustryPhase('${phase.id}')" role="button" tabindex="0" aria-label="${phase.title}"><div class="ic-timeline-rail-dot"></div></div>`;
    }
    return `
      <div class="ic-timeline-phase ${posClass} stage-${stage}${activeClass}" onclick="highlightIndustryPhase('${phase.id}')" role="button" tabindex="0">
        <div class="ic-timeline-window">${phase.window}</div>
        <div class="ic-timeline-title">${phase.title}</div>
      </div>`;
  };
  return `
    <div class="ic-timeline-rail ic-timeline-rail-aligned">
      <div class="ic-timeline-dots-band">
        <div class="ic-timeline-rail-track" style="background:${trackBg}" aria-hidden="true"></div>
        ${ic.timeline.map((phase, i) => renderPhase(phase, i, 'dots')).join('')}
      </div>
      <div class="ic-timeline-labels-band">
        ${ic.timeline.map((phase, i) => renderPhase(phase, i, 'labels')).join('')}
      </div>
    </div>
  `;
}

function formatProductMetric(row) {
  const parts = [];
  if (row.gap) parts.push(row.gap);
  if (row.priceChange) parts.push(row.priceChange);
  return parts.join(' ') || '—';
}

function getProductMetricClass(priceChange) {
  if (!priceChange) return '';
  return String(priceChange).trim().startsWith('-') ? 'ic-metric-down' : 'ic-metric-up';
}

function highlightIndustryPhase(phaseId) {
  const body = document.getElementById('industryChainBody');
  const judgmentId = body.dataset.judgmentId;
  const chainId = body.dataset.chainId || '';
  const resolved = resolveIndustryChain(judgmentId, chainId);
  if (!resolved) return;
  const { ic } = resolved;
  const phase = ic.timeline.find(p => p.id === phaseId);
  if (phase && phase.layerIds && phase.layerIds[0]) {
    industryChainActiveLayerId = phase.layerIds[0];
    ic.activePhaseId = phaseId;
    body.innerHTML = renderIndustryChainPage(judgmentId, chainId);
    requestAnimationFrame(() => {
      const el = document.getElementById('ic-layer-' + phase.layerIds[0]);
      if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

function isJudgmentWatching(judgmentId) {
  return MOCK.dailyBrief.watchTargets.some(w =>
    w.watching && Array.isArray(w.judgmentIds) && w.judgmentIds.includes(judgmentId)
  );
}

function toggleJudgmentWatch(judgmentId) {
  if (!requireLogin(
    () => toggleJudgmentWatch(judgmentId),
    '确认手机号后，即可跟踪这条推理主线'
  )) return;
  const related = MOCK.dailyBrief.watchTargets.filter(w =>
    Array.isArray(w.judgmentIds) && w.judgmentIds.includes(judgmentId)
  );
  if (related.length) {
    const next = !related.some(w => w.watching);
    related.forEach(w => { w.watching = next; });
  } else {
    const ev = getEventById(judgmentId);
    if (!ev) return;
    const sorted = sortImpactTargets(ev.impactTargets || []);
    const first = sorted[0];
    if (first) toggleWatchTarget(first.watchId, judgmentId);
    return;
  }
  syncWatchStats();
  renderHome();
  if (currentMode === 'analysis' && analysisStoryState.eventId === judgmentId) {
    renderAnalysisStory();
  }
  if (profileTrackTab === 'target') renderMicroTracking();
}

    return `<button type="button" class="mainline-watch-btn" onclick="event.stopPropagation(); toggleJudgmentWatch('${judgmentId}')" aria-label="添加跟踪">+ 跟踪</button>`;

  }
  return `<button class="impact-target-watch-btn" onclick="event.stopPropagation(); toggleJudgmentWatch('${judgmentId}')" aria-label="添加跟踪">+</button>`;
}

}

function getMicroTypeLabel(w) {

function getMicroWatchStage(w) {
  if (w.stage) return w.stage;
  const group = getMicroWatchGroup(w);
  if (group === 'macro-index') return 'building';
  if (group === 'commodity') return w.changeDir === 'up' ? 'igniting' : 'building';
  if (group === 'enterprise') return w.changeDir === 'up' ? 'igniting' : 'building';

}

  frame.classList.toggle('mode-analysis', name === 'analysis');
  frame.classList.toggle('mode-ai', name === 'ai');
  frame.classList.toggle('mode-profile', name === 'profile');
  document.getElementById('navTitle').textContent = NAV_TITLES[name];
  updateNavAvatar();
}

function switchTab(name, opts = {}) {
  const next = document.getElementById('screen-' + name);
  if (!next) return;
  const prevName = currentMode;
  if (prevName === name && !opts.force) {
    return;
  }

  const prev = document.getElementById('screen-' + prevName);
  if (screenSwitchTimer) {
    clearTimeout(screenSwitchTimer);
    screenSwitchTimer = null;
  }
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'screen-leaving');
  });

  if (prev && prev !== next && opts.animate !== false) {
    prev.classList.add('screen-leaving');
    next.classList.add('active');
    screenSwitchTimer = setTimeout(() => {
      prev.classList.remove('screen-leaving');
      screenSwitchTimer = null;
    }, 280);
  } else {
    next.classList.add('active');
  }

  currentMode = name;
  applyShellMode(name);
  closeAllSheets();

  if (prevName === 'analysis' && name !== 'analysis') cancelAnalysisTimers();
  if (name === 'home') requestAnimationFrame(restoreConclusionFeedScroll);
  if (name === 'ai' && opts.focus) {
    requestAnimationFrame(() => {
      const input = document.getElementById('composerInput');
      if (input) {
        if (opts.prefill != null) input.value = opts.prefill;
        input.focus();
        if (opts.prefill) {
          const len = input.value.length;
          try { input.setSelectionRange(len, len); } catch (_) {}
        }
      }
    });
  }
}

function openAiFromHome() {
  if (!requireLogin(

function goToAiWithDraft(text, opts = {}) {

  ).join('');
  if (extra > 0) html += `<span class="impact-chip more">+${extra}</span>`;
  return html;
}

function getEventById(id) {

function computeDayCaptureProgress(pushedAt) {
  const parts = pushedAt.split(':').map(Number);
  const h = parts[0] || 0;
  const m = parts[1] || 0;
  return Math.round(((h * 60 + m) / (24 * 60)) * 100);
}

function renderCaptureProgressRing(pct) {
  const r = 6.5;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct / 100);
  return `
    <svg class="capture-progress-ring" viewBox="0 0 16 16" aria-hidden="true">
      <circle class="track" cx="8" cy="8" r="${r}"/>
      <circle class="bar" cx="8" cy="8" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
  `;
}

let hintDismissHandler = null;

function showHintPopover(anchor, title, body) {
  closeHintPopover();
  const pop = document.getElementById('hintPopover');
  const frame = document.getElementById('phoneFrame');
  pop.innerHTML = `
    <div class="hint-popover-inner">
      <div class="hint-popover-title">${title}</div>
      <div class="hint-popover-body">${body}</div>
    </div>
  `;
  pop.classList.add('show');
  pop.style.visibility = 'hidden';
  const frameRect = frame.getBoundingClientRect();
  const anchorRect = anchor.getBoundingClientRect();
  const popWidth = pop.offsetWidth;
  const padding = 14;
  const anchorCenterX = anchorRect.left - frameRect.left + anchorRect.width / 2;
  let left = anchorCenterX - popWidth / 2;
  left = Math.max(padding, Math.min(left, frameRect.width - popWidth - padding));
  const top = anchorRect.bottom - frameRect.top + 8;
  const arrowLeft = anchorCenterX - left;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.style.setProperty('--hint-arrow-left', arrowLeft + 'px');
  pop.style.visibility = 'visible';
  setTimeout(() => {
    hintDismissHandler = (e) => {
      if (!pop.contains(e.target) && e.target !== anchor) closeHintPopover();
    };
    document.addEventListener('click', hintDismissHandler);
  }, 0);
}

function closeHintPopover() {
  const pop = document.getElementById('hintPopover');
  if (pop) {
    pop.classList.remove('show');
    pop.style.visibility = '';
    pop.style.top = '';
    pop.style.left = '';
    pop.style.removeProperty('--hint-arrow-left');
  }
  if (hintDismissHandler) {
    document.removeEventListener('click', hintDismissHandler);
    hintDismissHandler = null;
  }
}

const decisionTreeFocusByEvent = {};
const DECISION_TRACK_STAGES = ['识别', '验证', '扩散', '钝化'];

function getDecisionTreeFocusId(ev) {
  return decisionTreeFocusByEvent[ev.id] || ev.decisionTree?.defaultNodeId || ev.decisionTree?.supportBranch?.id || '';
}

function getDecisionTreeNode(ev, nodeId) {
  const tree = ev.decisionTree;
  if (!tree) return null;
  if (tree.supportBranch?.id === nodeId) return { ...tree.supportBranch, nodeType: 'branch', branchType: 'support' };
  if (tree.counterBranch?.id === nodeId) return { ...tree.counterBranch, nodeType: 'branch', branchType: 'counter' };
  const hotspot = (tree.hotspots || []).find(node => node.id === nodeId);
  return hotspot ? { ...hotspot, nodeType: 'hotspot' } : null;
}

function selectDecisionTreeNode(eventId, nodeId) {
  if (!requireLogin(
    () => selectDecisionTreeNode(eventId, nodeId),
    '确认手机号后，即可展开节点并继续深度交流'
  )) return;
  decisionTreeFocusByEvent[eventId] = nodeId;
  const ev = getEventById(eventId);
  const shell = document.querySelector(`[data-decision-tree="${eventId}"]`);
  if (!ev?.decisionTree || !shell) return;
  shell.outerHTML = renderDecisionTreeCard(ev);
  if (currentMode === 'analysis' && analysisStoryState.eventId === eventId) {
    startAnalysisNodeConversation(eventId, nodeId);
  }
}

function getDecisionRootShortText(ev) {

    'evt-usd': '美元指数站上 101，10Y 美债收益率维持 4.3% 上方。',

function getEventsForChain(chain) {
  const fromIds = chain.eventIds?.length
    ? chain.eventIds.map(id => getFactEventById(id)).filter(Boolean)
    : [];
  const fromChainId = chain.judgmentId
    ? getJudgmentEvents(chain.judgmentId).filter(e => e.chainId === chain.id)
    : [];
  const seen = new Set();
  return [...fromIds, ...fromChainId].filter(e => {
    if (seen.has(e.id)) return false;
    seen.add(e.id);
    return true;
  });
}

function getTargetsForChain(chainId, targets) {
  return targets.filter(t => Array.isArray(t.chainIds) && t.chainIds.includes(chainId));
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getConclusionFeedItems() {
  const weightScores = { high: 4, medium: 2, low: 1 };
  const stageScores = { verified: 3, validating: 2, pending: 1 };
  const items = MOCK.dailyBrief.events
    .map(ev => {
      const facts = getJudgmentEvents(ev.id);
      const latestFact = facts[0] || null;
      const themes = [...new Set(facts.flatMap(item => item.themeTags || []))];
      const sources = [...new Set(facts.map(item => item.detail?.source).filter(Boolean))];
      const hotspots = ev.decisionTree?.hotspots || [];
      const factScore = facts.reduce((sum, fact) => sum + (weightScores[fact.weight] || 1), 0);
      const stageScore = hotspots.reduce((sum, hotspot) => sum + (stageScores[hotspot.stage] || 1), 0);
      const freshnessScore = latestFact ? Math.max(0, 4 - Math.floor(latestFact.minutesAgo / 360)) : 0;
      const impactScore = factScore + stageScore + freshnessScore + hotspots.length;
      return {
        ev,
        facts,
        latestFact,
        themes,
        sources,
        impactScore,
        searchable: [
          ev.narrativeTitle,
          ev.category,
          ev.mainlineBrief?.headline,
          ev.mainlineBrief?.analysisConclusion,
          ...themes,
          ...facts.flatMap(item => [item.title, item.keyword, item.summary, item.detail?.source]),
        ].filter(Boolean).join(' ').toLowerCase(),
      };
    })
    .sort((a, b) =>
      b.impactScore - a.impactScore
      || (a.latestFact?.minutesAgo ?? Infinity) - (b.latestFact?.minutesAgo ?? Infinity)
    );
  return items;
}

function getConclusionFeedThemes() {
  return ['全部', ...new Set(getConclusionFeedItems().flatMap(item => item.themes))];
}

function getFilteredConclusionFeedItems() {
  const query = conclusionFeedState.query.trim().toLowerCase();
  return getConclusionFeedItems().filter(item => {
    const themeMatches = conclusionFeedState.theme === '全部' || item.themes.includes(conclusionFeedState.theme);
    const queryMatches = !query || item.searchable.includes(query);
    const trackingMatches = !conclusionFeedState.trackingOnly || isJudgmentWatching(item.ev.id);
    return themeMatches && queryMatches && trackingMatches;
  });
}

function getConclusionCausalView(ev, item = {}) {
  const tree = ev.decisionTree || {};
  const hotspots = tree.hotspots || [];
  const cause = String(tree.rootFact?.text || ev.mainlineBrief?.headline || ev.title || '').split(/[，。；]/)[0];
  const mechanism = tree.supportBranch?.condition || tree.decisionQuestion || '产业机制正在变化';
  const nextHotspot = hotspots.find(node => node.stage === 'pending') || hotspots[hotspots.length - 1];
  const score = item.impactScore || 0;
  return {
    level: score >= 20 ? '高影响' : score >= 14 ? '重点关注' : '持续观察',
    levelClass: score >= 20 ? 'high' : score >= 14 ? 'medium' : 'watch',
    cause,
    mechanism,
    pathSummary: `${cause} → ${mechanism}`,
    industries: hotspots.map(node => node.label),
    stage: tree.tracking?.stage || '验证',
    hiddenSignal: nextHotspot
      ? `${nextHotspot.label}尚未充分显现，下一步看${tree.tracking?.nextCheckpoint || nextHotspot.effect}`
      : tree.tracking?.nextCheckpoint || '等待下一批事实验证',
  };
}

function getTrackedIndustryNode(hotspot) {
  return (MOCK.macroTracking?.industryNodes || []).find(node => node.layerId === hotspot.layerId);
}

function toggleConclusionIndustryTrack(eventId, hotspotId) {
  if (!requireLogin(
    () => toggleConclusionIndustryTrack(eventId, hotspotId),
    '确认手机号后，即可跟踪这个产业节点'
  )) return;
  const ev = getEventById(eventId);
  const hotspot = ev?.decisionTree?.hotspots?.find(node => node.id === hotspotId);
  if (!ev || !hotspot) return;
  const industryNodes = MOCK.macroTracking.industryNodes;
  const trackedIndex = industryNodes.findIndex(node => node.layerId === hotspot.layerId);
  if (trackedIndex >= 0) {
    industryNodes.splice(trackedIndex, 1);
  } else {
    industryNodes.unshift({
      id: `tracked-${hotspot.id}`,
      layerName: hotspot.label,
      ignitePoint: hotspot.interpretation || hotspot.effect,
      trackedDays: 1,
      judgmentId: ev.id,
      chainId: hotspot.chainId,
      layerId: hotspot.layerId,
      stage: hotspot.stage === 'verified' ? 'ignited' : hotspot.stage === 'pending' ? 'building' : 'igniting',
      hotStatus: hotspot.status || '持续验证',
      headlineMetric: hotspot.metric,
    });
  }
  syncWatchStats();
  if (currentMode === 'home') refreshConclusionFeedResults();
  openConclusionIndustryActions(eventId, hotspotId);
}

  const prompts = {

      { question: '光模块会如何传导？', title: '需求正由算力芯片向高速互联扩散', digest: '资本开支经服务器订单与800G占比传向光模块，后续需验证PCB/载板及结构材料。', time: '17:32', tokens: 1760, path: '光模块' },

const analysisStoryState = {
  eventId: '',
  stages: [],
  revealed: 0,
  followUps: [],
  visibleConversationFrom: 0,
  selectedNodeIds: [],
  historyId: '',
  totalTokens: 0,
  summaryCount: 0,
  timers: [],
  token: 0,
  waitingReply: false,
};

function cancelAnalysisTimers() {
  analysisStoryState.timers.forEach(timer => clearTimeout(timer));
  analysisStoryState.timers = [];
  analysisStoryState.waitingReply = false;
}

function buildAnalysisStoryStages(ev) {
  const tree = ev.decisionTree;
  if (!tree) return [];

  const trackingIndex = Math.max(0, DECISION_TRACK_STAGES.indexOf(tree.tracking.stage));
  return [
    {
      kicker: '01 · 事实聚合',
      title: '先把主线拆回政经事件',
      html: `
        <p>${escapeHtml(tree.rootFact.text)}</p>
        <p>这不是由单条消息直接得出的判断，而是对 <strong>${facts.length} 条相关新闻</strong>交叉核验后的事实锚点。当前证据完整度为 <strong>${escapeHtml(tree.rootFact.evidence)}</strong>，来源包括 ${escapeHtml(tree.rootFact.source)}。</p>
        <div class="analysis-evidence-links">
          ${facts.slice(0, 4).map(fact => `<button type="button" class="analysis-evidence-link" onclick="openFactEventDetail('${fact.id}')">${escapeHtml(fact.keyword)} · ${escapeHtml(fact.detail?.source || '')}</button>`).join('')}
          ${facts.length > 4 ? `<button type="button" class="analysis-evidence-link" onclick="openJudgmentEventTimeline('${ev.id}')">查看全部 ${facts.length} 条 ›</button>` : ''}
        </div>
      `,
    },
    {
      kicker: '02 · 机制设问',
      title: '接下来需要回答一个关键问题',
      html: `
        <p><strong>${escapeHtml(tree.decisionQuestion)}</strong></p>
        <p>我们不会直接给出行动指令，而是同时保留支持与反证条件，再观察哪条路径获得更多事实验证。</p>
      `,
    },
    {
      kicker: '03 · 双向验证',
      title: '把推理拆成支持路径与反证路径',
      html: `
        <div class="analysis-branch-grid">
          <div class="analysis-branch">
            <b>${escapeHtml(tree.supportBranch.title)}</b>
            <strong>${escapeHtml(tree.supportBranch.condition)}</strong>
            <small>${escapeHtml(tree.supportBranch.detail)}</small>
          </div>
          <div class="analysis-branch counter">
            <b>${escapeHtml(tree.counterBranch.title)}</b>
            <strong>${escapeHtml(tree.counterBranch.condition)}</strong>
            <small>${escapeHtml(tree.counterBranch.detail)}</small>
          </div>
        </div>
        <p>当前解读：${escapeHtml(tree.supportBranch.interpretation)} 同时需要用“${escapeHtml(tree.counterBranch.condition)}”持续做反证。</p>
      `,
    },
    {
      kicker: '04 · 传导定位',
      title: '现在定位传导产业与实际效用',
      html: `
        <p>我们把热点放回产业链，区分已经验证、正在验证和下一观察节点。这里的“效用”只描述成本、价格、交期、需求或议价权的变化。</p>
        <div class="analysis-hotspot-list">
          ${tree.hotspots.map(node => `
            <div class="analysis-hotspot stage-${node.stage}">
              <i class="analysis-hotspot-dot"></i>
              <div class="analysis-hotspot-main">
                <strong>${escapeHtml(node.label)} · ${escapeHtml(node.status)}</strong>
                <small>${escapeHtml(node.effect)}。${escapeHtml(node.interpretation)}</small>
              </div>
              <em>${escapeHtml(node.metric)}</em>
            </div>
          `).join('')}
        </div>
        ${tree.hotspots[0]?.chainId ? `<button type="button" class="analysis-graph-link" onclick="openIndustryChainNodeTrack('${ev.id}', '${tree.hotspots[0].chainId}', '${tree.hotspots[0].layerId || ''}')">查看完整产业链图谱 ›</button>` : ''}
      `,
    },
    {
      kicker: '05 · 观察方案',
      title: '把推理转成可持续验证的观察流程',
      html: `
        <div class="analysis-plan-list">
          <div class="analysis-plan-item"><span>重点观察</span><p>${escapeHtml(tree.observationPlan.watch)}</p></div>
          <div class="analysis-plan-item"><span>验证条件</span><p>${escapeHtml(tree.observationPlan.verify)}</p></div>
          <div class="analysis-plan-item"><span>失效信号</span><p>${escapeHtml(tree.observationPlan.invalidate)}</p></div>
          <div class="analysis-plan-item"><span>下次复核</span><p>${escapeHtml(tree.observationPlan.nextReview)}</p></div>
        </div>
        <p>这是用于减少遗漏的决策流程，不是投资指令。</p>

      kicker: '06 · 长期跟踪',
      title: `这条主线正处于“${escapeHtml(tree.tracking.stage)}”阶段`,
      html: `
        <p>已持续跟踪 <strong>${tree.tracking.trackedDays} 天</strong>。最近变化是：${escapeHtml(tree.tracking.recentChange)}。</p>
        <div class="analysis-tracking-line">
          ${DECISION_TRACK_STAGES.map((stage, index) => `<span class="${index < trackingIndex ? 'is-done' : index === trackingIndex ? 'is-current' : ''}">${stage}</span>`).join('')}

function getAnalysisSuggestions(ev) {
  const hotspot = ev.decisionTree?.hotspots?.[0]?.label || '当前热点';
  return [
    `${hotspot}会如何传导？`,
    '哪些事实支持这个判断？',
    '最重要的反证信号是什么？',
    '接下来重点观察什么？',
    '这条主线跟踪到哪一步？',
  ];
}

function renderAnalysisMessage(message, isNew) {
  const newClass = isNew ? ' is-new' : '';
  if (message.role === 'user') {
    return `<div class="analysis-message is-user${newClass}"><div class="analysis-message-card"><p>${escapeHtml(message.text)}</p></div></div>`;
  }
  return `
    <div class="analysis-message${newClass}">
      <div class="analysis-message-card">
        ${message.kicker ? `<span class="analysis-message-kicker">${message.kicker}</span>` : ''}
        ${message.title ? `<h3>${message.title}</h3>` : ''}
        ${message.html || ''}
        ${message.tokenCost ? `
          <div class="analysis-message-record">
            <span>✓ 已为本次对话总结并记录 · ${message.tokenCost} tokens</span>
            <button type="button" onclick="openCurrentConversationRecord()">查看对话记录</button>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function getCurrentExplorationQuestions() {
  return analysisStoryState.followUps
    .filter(message => message.role === 'user')
    .map(message => message.text);
}

function estimateAnalysisTokens(question, response) {
  const length = String(question || '').length + String(response?.title || '').length + String(response?.html || '').replace(/<[^>]+>/g, '').length;
  return Math.max(180, Math.round((length * 4.2 + 120) / 10) * 10);
}

function getHistoryTimeLabel() {
  const now = new Date();
  return `今天 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
}

function getConversationDigest(response) {
  const text = String(response?.html || '')
    .replace(/<br\s*\/?>/gi, '；')
    .replace(/<[^>]+>/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  return text.length > 88 ? `${text.slice(0, 88)}…` : text;
}

function saveConversationSummary(ev, question, response) {
  const tokenCost = estimateAnalysisTokens(question, response);
  analysisStoryState.summaryCount += 1;
  analysisStoryState.totalTokens += tokenCost;
  response.summaryIndex = analysisStoryState.summaryCount;
  response.tokenCost = tokenCost;

  let history = explorationHistories.find(item => item.id === analysisStoryState.historyId);
  if (!history) {
    history = {
      id: `history-${ev.id}-${Date.now()}`,
      eventId: ev.id,
      title: ev.mainlineBrief?.headline || ev.narrativeTitle || ev.title,
      updatedAt: getHistoryTimeLabel(),
      group: '今天',
      tokens: 0,
      nodeIds: [],
      messages: [],
      summaries: [],
    };
    explorationHistories.unshift(history);
    analysisStoryState.historyId = history.id;
  }
  history.updatedAt = getHistoryTimeLabel();
  history.tokens = analysisStoryState.totalTokens;
  history.nodeIds = [...analysisStoryState.selectedNodeIds];
  history.messages = [...analysisStoryState.followUps, response].map(message => ({ ...message }));
  history.summaries.push({
    question,
    title: response.title || '完成一次路径推理',
    digest: getConversationDigest(response),
    time: getHistoryTimeLabel().replace('今天 ', ''),
    tokens: tokenCost,
    path: getLatestExplorationPathLabel(ev),
  });
  renderExplorationHistoryList();
}

function getLatestExplorationPathLabel(ev) {
  const nodeId = analysisStoryState.selectedNodeIds[analysisStoryState.selectedNodeIds.length - 1];
  return getExplorationNodeLabel(ev, nodeId) || '自然语言对话';
}

function getExplorationNodeLabel(ev, nodeId) {
  const node = getDecisionTreeNode(ev, nodeId);
  if (!node) return '';
  if (node.nodeType === 'hotspot') return node.label;
  return node.branchType === 'counter' ? '反证推理' : '支持推理';
}

function renderAnalysisStory() {
  const ev = getEventById(analysisStoryState.eventId);
  const header = document.getElementById('analysisStoryHeader');
  const container = document.getElementById('analysisStoryContent');
  if (!ev || !header || !container) return;
  const feedItem = getConclusionFeedItems().find(item => item.ev.id === ev.id) || {};
  const causal = getConclusionCausalView(ev, feedItem);
  const suggestions = getAnalysisSuggestions(ev);
  const visibleMessages = analysisStoryState.followUps.slice(analysisStoryState.visibleConversationFrom);
  header.innerHTML = `
    <header class="analysis-story-header">
      <div class="analysis-story-meta">
        <b>${escapeHtml(ev.category)}</b>
        <span>${getJudgmentEvents(ev.id).length} 条政经事件聚合</span>
        <span>· ${escapeHtml(ev.decisionTree?.rootFact?.freshness || '持续更新')}</span>
        ${renderJudgmentWatchBtn(ev.id, 'mainline')}
      </div>
      <h1>${escapeHtml(ev.mainlineBrief?.headline || ev.title)}</h1>
      <p>${escapeHtml(causal.pathSummary)}</p>
    </header>
  `;
  container.innerHTML = `
    <main class="analysis-story-body">
      <div class="analysis-tree-intro">
        <strong>完整推理树</strong>
        点击分支或传导产业节点，可继续对话深挖。
      </div>
      <div class="analysis-tree-wrap">${renderDecisionTreeCard(ev)}</div>
      <div class="analysis-tree-conversation-head">
        基于所选路径继续推理
        ${analysisStoryState.historyId ? '<button type="button" onclick="openCurrentConversationRecord()">查看对话记录</button>' : ''}
      </div>
      ${visibleMessages.map((message, index) => renderAnalysisMessage(message, index === visibleMessages.length - 1)).join('')}
      ${analysisStoryState.waitingReply ? `
        <div class="analysis-typing">
          <div class="analysis-typing-bubble">正在沿所选路径继续推理<span class="analysis-typing-dots"><i></i><i></i><i></i></span></div>
        </div>
      ` : !analysisStoryState.followUps.length ? `
        <div class="analysis-suggestions">
          <div class="analysis-suggestion-row">
            ${suggestions.map(text => `<button type="button" class="analysis-suggestion" onclick="sendAnalysisFollowUp('${text}')">${escapeHtml(text)}</button>`).join('')}
          </div>
        </div>
      ` : `
        <div class="analysis-suggestions">
          继续当前对话
          <div class="analysis-suggestion-row">
            ${suggestions.map(text => `<button type="button" class="analysis-suggestion" onclick="sendAnalysisFollowUp('${text}')">${escapeHtml(text)}</button>`).join('')}
          </div>
        </div>
      `}
    </main>
  `;
  requestAnimationFrame(() => {
    const scroll = document.getElementById('analysisStoryScroll');
    if (scroll && visibleMessages.length) {
      scroll.scrollTo({ top: scroll.scrollHeight, behavior: 'smooth' });
    }
  });
}

function scheduleNextAnalysisStage(delay = 1150) {
  if (analysisStoryState.revealed >= analysisStoryState.stages.length) return;
  const token = analysisStoryState.token;
  const timer = setTimeout(() => {
    analysisStoryState.timers = analysisStoryState.timers.filter(item => item !== timer);
    if (token !== analysisStoryState.token || currentMode !== 'analysis') return;
    revealNextAnalysisStage();
  }, delay);
  analysisStoryState.timers.push(timer);
}

function revealNextAnalysisStage() {
  if (analysisStoryState.revealed >= analysisStoryState.stages.length) return;
  analysisStoryState.revealed += 1;
  renderAnalysisStory();
  scheduleNextAnalysisStage();
}

function continueAnalysisStory() {
  cancelAnalysisTimers();
  revealNextAnalysisStage();
}

function revealAllAnalysisStages() {
  cancelAnalysisTimers();
  analysisStoryState.revealed = analysisStoryState.stages.length;
  renderAnalysisStory();
}

function openAnalysisStory(eventId) {
  const ev = getEventById(eventId);
  if (!ev) return;
  const existingHistory = explorationHistories.find(item => item.eventId === eventId);
  rememberConclusionFeedScroll();
  cancelAnalysisTimers();
  analysisStoryState.token += 1;
  analysisStoryState.eventId = eventId;
  analysisStoryState.stages = [];
  analysisStoryState.revealed = 0;
  analysisStoryState.followUps = existingHistory ? existingHistory.messages.map(message => ({ ...message })) : [];
  analysisStoryState.visibleConversationFrom = analysisStoryState.followUps.length;
  analysisStoryState.selectedNodeIds = existingHistory ? [...existingHistory.nodeIds] : [];
  analysisStoryState.historyId = existingHistory?.id || '';
  analysisStoryState.totalTokens = existingHistory?.tokens || 0;
  analysisStoryState.summaryCount = existingHistory?.summaries.length || 0;
  analysisStoryState.waitingReply = false;
  const lastNodeId = analysisStoryState.selectedNodeIds[analysisStoryState.selectedNodeIds.length - 1];
  if (lastNodeId) decisionTreeFocusByEvent[eventId] = lastNodeId;
  switchTab('analysis', { animate: true });
  renderAnalysisStory();
  requestAnimationFrame(() => {
    const scroll = document.getElementById('analysisStoryScroll');
    if (scroll) scroll.scrollTop = 0;
  });
}

function startAnalysisNodeConversation(eventId, nodeId) {
  const ev = getEventById(eventId);
  const node = ev ? getDecisionTreeNode(ev, nodeId) : null;
  if (!ev || !node) return;
  if (!analysisStoryState.selectedNodeIds.includes(nodeId)) {
    analysisStoryState.selectedNodeIds.push(nodeId);
  }
  const question = node.nodeType === 'hotspot'
    ? `继续分析“${node.label}”传导产业，它的效用和验证条件是什么？`
    : `${node.branchType === 'counter' ? '请展开反证推理' : '请展开支持推理'}：“${node.condition}”目前应如何验证？`;
  sendAnalysisFollowUp(question);
}

function openAnalysisObservationConversation(eventId, label) {
  if (!requireLogin(
    () => openAnalysisObservationConversation(eventId, label),
    '确认手机号后，即可围绕观察方案继续交流'
  )) return;
  if (currentMode !== 'analysis' || analysisStoryState.eventId !== eventId) return;
  const prompts = {
    '重点观察': '请展开重点观察变量，并说明为什么这些变量重要。',
    '验证条件': '请展开当前主线的验证条件。',
    '失效信号': '请展开反证路径和失效信号。',
    '下次复核': '请说明下次复核要检查哪些变化。',
  };
  sendAnalysisFollowUp(prompts[label] || `请展开“${label}”。`);
}

function trackExplorationFromQuestion(ev, text) {
  const nextIds = [];
  if (/支持推理|支持路径/.test(text)) nextIds.push(ev.decisionTree.supportBranch.id);
  if (/反证|风险|失效/.test(text)) nextIds.push(ev.decisionTree.counterBranch.id);
  ev.decisionTree.hotspots.forEach(node => {
    if (text.toLowerCase().includes(node.label.toLowerCase())) nextIds.push(node.id);
  });
  nextIds.forEach(id => {
    if (!analysisStoryState.selectedNodeIds.includes(id)) analysisStoryState.selectedNodeIds.push(id);
  });
}

function focusAnalysisComposer() {
  document.getElementById('analysisComposerInput')?.focus();
}

function openExplorationHistory() {
  renderExplorationHistoryList();
  if (historyDrawerTimer) clearTimeout(historyDrawerTimer);
  const screen = document.getElementById('screen-history');
  const feedBody = document.querySelector('#screen-home .conclusion-feed-body');
  const containerRect = screen?.parentElement?.getBoundingClientRect();
  const feedRect = feedBody?.getBoundingClientRect();
  const sheetTop = currentMode === 'home' && containerRect && feedRect
    ? Math.max(92, feedRect.top - containerRect.top)
    : 126;
  screen?.style.setProperty('--history-sheet-top', `${sheetTop}px`);
  screen?.classList.remove('history-drawer-closing');
  screen?.classList.add('history-drawer-open');
  document.getElementById('navTitle').textContent = '问潮';
}

function closeHistoryDrawer() {
  const screen = document.getElementById('screen-history');
  if (!screen?.classList.contains('history-drawer-open')) return;
  screen.classList.remove('history-drawer-open');
  screen.classList.add('history-drawer-closing');
  historyDrawerTimer = setTimeout(() => {
    screen.classList.remove('history-drawer-closing');
    document.getElementById('navTitle').textContent = NAV_TITLES[currentMode];
    historyDrawerTimer = null;
  }, 310);
}

function renderExplorationHistoryItem(history) {
  const ev = getEventById(history.eventId);
  const lastSummary = history.summaries[history.summaries.length - 1];
  const questionCount = history.messages.filter(message => message.role === 'user').length;
  return `
    <article class="exploration-history-item" onclick="resumeExplorationHistory('${history.id}')" role="button" tabindex="0">
      <div class="exploration-history-item-head">
        <h3>${escapeHtml(history.title)}</h3>
        <time>${escapeHtml(history.updatedAt.replace('今天 ', ''))}</time>
      </div>
      <p>最近一次总结：${escapeHtml(lastSummary?.title || ev?.narrativeTitle || '')}</p>
      <div class="exploration-history-item-meta">
        <span>${questionCount} 段对话</span>
        <span>${history.nodeIds.length} 个节点</span>
        <span>${history.tokens.toLocaleString()} tokens</span>
        <b>继续对话 ›</b>
      </div>
    </article>
  `;
}

function renderExplorationHistoryList() {
  const el = document.getElementById('explorationHistoryList');
  if (!el) return;
  const histories = explorationHistories;
  if (!histories.length) {
    el.innerHTML = '<div class="profile-track-empty">暂无相关对话<br>围绕任一总结性事件开始对话后会自动保存</div>';
    return;
  }
  const groups = ['今天', '最近7天', '更早'];
  el.innerHTML = groups.map(group => {
    const items = histories.filter(item => item.group === group);
    if (!items.length) return '';
    return `
      <section>
        <div class="exploration-history-group-title">${group}</div>
        ${items.map(renderExplorationHistoryItem).join('')}
      </section>
    `;
  }).join('');
}

function resumeExplorationHistory(historyId) {
  const history = explorationHistories.find(item => item.id === historyId);
  const ev = history ? getEventById(history.eventId) : null;
  if (!history || !ev) return;
  closeHistoryDrawer();
  cancelAnalysisTimers();
  analysisStoryState.token += 1;
  analysisStoryState.eventId = ev.id;
  analysisStoryState.stages = [];
  analysisStoryState.revealed = 0;
  analysisStoryState.followUps = history.messages.map(message => ({ ...message }));
  analysisStoryState.visibleConversationFrom = history.messages.length;
  analysisStoryState.selectedNodeIds = [...history.nodeIds];
  analysisStoryState.historyId = history.id;
  analysisStoryState.totalTokens = history.tokens;
  analysisStoryState.summaryCount = history.summaries.length;
  analysisStoryState.waitingReply = false;
  const lastNodeId = history.nodeIds[history.nodeIds.length - 1];
  if (lastNodeId) decisionTreeFocusByEvent[ev.id] = lastNodeId;
  switchTab('analysis', { animate: true });
  renderAnalysisStory();
}

function openCurrentConversationRecord() {
  const history = explorationHistories.find(item => item.id === analysisStoryState.historyId);
  if (!history) {
    showToast('完成一段对话后会自动总结并保存');
    return;
  }
  document.getElementById('detailTitle').textContent = '历史对话';
  document.getElementById('detailSubtitle').textContent = `${history.summaries.length} 段对话已总结 · ${history.tokens.toLocaleString()} tokens`;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <div class="conversation-summary-list">
        ${[...history.summaries].reverse().map(summary => `
          <div class="conversation-summary-item">
            <b>${escapeHtml(summary.question)}</b>
            <div class="conversation-summary-subtitle">${escapeHtml(summary.title || '')}</div>
            <small>${escapeHtml(summary.time || '')} · ${escapeHtml(summary.path)} · ${summary.tokens} tokens</small>
            <p>${escapeHtml(summary.digest || '')}</p>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  showSheet('detailSheet');
}

function renderAnalysisDialogContext(tree) {

    <div class="analysis-dialog-context">
      <div class="analysis-dialog-context-row">
        <b>观察方案</b>
        <p>重点观察：${escapeHtml(tree.observationPlan.watch)}<br>失效信号：${escapeHtml(tree.observationPlan.invalidate)}</p>
      </div>
      <div class="analysis-dialog-context-row">
        <b>长期跟踪 · ${escapeHtml(tree.tracking.stage)}阶段</b>

}

function renderAnalysisPrimaryReasoningTree(ev, hotspot) {
  const focusId = hotspot?.id || getDecisionTreeFocusId(ev);
  return `
    <div class="decision-tree-shell analysis-response-tree">
      <div class="decision-tree-content">
        ${renderDecisionTreeRoot(ev)}
        ${renderDecisionBranches(ev, focusId)}
        ${renderTransmissionHotspots(ev, focusId)}
      </div>
    </div>

}

function getAnalysisHotspotCompanies(ev, hotspot) {
  const resolved = resolveIndustryChain(ev.id, hotspot.chainId);
  const layer = resolved?.ic?.layers?.find(item => item.id === hotspot.layerId);
  if (!layer?.companies?.length) return [];
  return layer.companies
    .map(company => getCompanyDisplayInfo(company, ev.id, resolved.ic))
    .filter(company => company.watchId);
}

function renderAnalysisCompanyList(companies, eventId) {
  if (!companies.length) {

function buildAnalysisFollowUpResponse(ev, question) {
  const tree = ev.decisionTree;
  const facts = getJudgmentEvents(ev.id);
  const text = question.toLowerCase();
  if (/支持路径|支持推理/.test(text)) {
    return {
      kicker: '支持推理深挖',
      title: escapeHtml(tree.supportBranch.condition),
      html: `<p>${escapeHtml(tree.supportBranch.detail)}</p><p>当前路径解读：${escapeHtml(tree.supportBranch.interpretation)}</p><p>继续验证时重点观察：<strong>${escapeHtml(tree.observationPlan.verify)}</strong></p>`,
    };
  }
  if (/反证|风险|失效|不成立/.test(text)) {
    return {
      kicker: '反证检索',
      title: '最需要警惕的不是波动，而是机制失效',
      html: `<p>${escapeHtml(tree.counterBranch.detail)}</p><p>当前明确的失效信号是：<strong>${escapeHtml(tree.observationPlan.invalidate)}</strong>。在它出现前，反证推理仍应持续保留。</p>`,
    };
  }
  if (/事实|新闻|依据|来源/.test(text)) {
    return {
      kicker: '事实溯源',
      title: `目前由 ${facts.length} 条政经事件共同支撑`,
      html: `
        <p>这些政经事件分别从政策、价格、订单或产业反馈侧验证同一机制，单个事件只作为证据片段。</p>
        <div class="analysis-evidence-links">${facts.map(fact => `<button type="button" class="analysis-evidence-link" onclick="openFactEventDetail('${fact.id}')">${escapeHtml(fact.keyword)} · ${escapeHtml(fact.detail?.source || '')}</button>`).join('')}</div>
      `,
    };
  }
  if (/企业|公司|龙头/.test(text)) {
    const hotspot = tree.hotspots.find(item => text.includes(item.label.toLowerCase()))
      || tree.hotspots.find(item => item.stage === 'validating')
      || tree.hotspots[0];
    const companies = getAnalysisHotspotCompanies(ev, hotspot);
    return {
      kicker: '企业映射',
      title: `${escapeHtml(hotspot.label)}产业链中的企业位置`,
      html: `<p>以下企业处在该产业影响路径的直接位置，可继续观察订单、交期和盈利变化。</p>${renderAnalysisCompanyList(companies, ev.id)}`,
    };
  }
  if (/传导|热点|影响|效用|如何/.test(text)) {
    const hotspot = tree.hotspots.find(item => text.includes(item.label.toLowerCase())) || tree.hotspots.find(item => item.stage === 'validating') || tree.hotspots[0];
    const isPrimaryHotspot = hotspot.id === tree.hotspots[0]?.id;
    return {
      kicker: isPrimaryHotspot ? '三层传导推演' : '传导对话',
      title: isPrimaryHotspot ? `${escapeHtml(hotspot.label)}完整推理树` : `${escapeHtml(hotspot.label)}是当前需要核验的传导节点`,
      html: isPrimaryHotspot
        ? renderAnalysisPrimaryReasoningTree(ev, hotspot)
        : `<p>${escapeHtml(hotspot.interpretation)}</p><p>可观察效用是 <strong>${escapeHtml(hotspot.effect)}</strong>，当前指标为 <strong>${escapeHtml(hotspot.metric)}</strong>。</p><button type="button" class="analysis-graph-link" onclick="openIndustryChainNodeTrack('${ev.id}', '${hotspot.chainId}', '${hotspot.layerId || ''}')">在产业链图谱中定位 ›</button>`,
    };
  }
  if (/观察|验证|跟踪|复核/.test(text)) {
    return {
      kicker: '观察流程',
      title: '下一步不是直接判断，而是等待验证条件',
      html: `<p>重点观察：${escapeHtml(tree.observationPlan.watch)}</p><p>验证条件：<strong>${escapeHtml(tree.observationPlan.verify)}</strong></p><p>下次复核：${escapeHtml(tree.observationPlan.nextReview)}。</p>${renderAnalysisDialogContext(tree)}`,
    };
  }
  return {
    kicker: '上下文回答',
    title: '我会把这个问题放回当前主线的验证框架',
    html: `<p>${escapeHtml(tree.supportBranch.interpretation)}</p><p>同时保留反证：${escapeHtml(tree.counterBranch.interpretation)}</p><p>建议继续对话，聚焦具体事实、传导产业或失效信号，以便定位到可验证变量。</p>`,
  };
}

function sendAnalysisFollowUp(prefill) {
  if (!requireLogin(
    () => sendAnalysisFollowUp(prefill),
    '确认手机号后，即可继续本次深度分析对话'
  )) return;
  const ev = getEventById(analysisStoryState.eventId);
  const input = document.getElementById('analysisComposerInput');
  const text = String(prefill || input?.value || '').trim();
  if (!ev || !text || analysisStoryState.waitingReply) {
    if (!text && input) input.focus();
    return;
  }
  cancelAnalysisTimers();
  trackExplorationFromQuestion(ev, text);
  if (input) input.value = '';
  analysisStoryState.followUps.push({ role: 'user', text });
  analysisStoryState.waitingReply = true;
  renderAnalysisStory();
  const token = analysisStoryState.token;
  const timer = setTimeout(() => {
    analysisStoryState.timers = analysisStoryState.timers.filter(item => item !== timer);
    if (token !== analysisStoryState.token || currentMode !== 'analysis') return;
    const response = { role: 'ai', ...buildAnalysisFollowUpResponse(ev, text) };
    saveConversationSummary(ev, text, response);
    analysisStoryState.followUps.push(response);
    analysisStoryState.waitingReply = false;
    renderAnalysisStory();
  }, 720);
  analysisStoryState.timers.push(timer);
}

const EVENT_WEIGHT_META = {
  high: { label: '重大', class: 'importance-high' },
  medium: { label: '关注', class: 'importance-medium' },
  low: { label: '一般', class: 'importance-low' },
};

function formatEventRelativeTime(minutesAgo, pushedAt) {
  if (minutesAgo < 60) return `${minutesAgo}分钟前`;
  if (minutesAgo < 360) return `${Math.max(1, Math.floor(minutesAgo / 60))}小时前`;
  const [ph, pm] = pushedAt.split(':').map(Number);
  const pushMins = ph * 60 + pm;
  const eventMins = pushMins - minutesAgo;
  const pad = n => String(n).padStart(2, '0');
  if (eventMins >= 0) {
    return `今日 ${pad(Math.floor(eventMins / 60))}:${pad(eventMins % 60)}`;
  }
  const yesterdayMins = eventMins + 24 * 60;
  return `昨日 ${pad(Math.floor(yesterdayMins / 60))}:${pad(yesterdayMins % 60)}`;
}

function renderTimelineItem(evt, pushedAt) {
  const weightMeta = EVENT_WEIGHT_META[evt.weight] || EVENT_WEIGHT_META.medium;
  const timeLabel = formatEventRelativeTime(evt.minutesAgo, pushedAt);
  return `
    <div class="timeline-item weight-${evt.weight}" onclick="openFactEventDetail('${evt.id}')" role="button" tabindex="0">
      <div class="timeline-dot"></div>
      <div class="timeline-time">${timeLabel}</div>
      <div class="timeline-title">${evt.title}</div>
      <div class="timeline-meta">
        <span class="event-keyword-chip">${evt.keyword}</span>
        <span class="timeline-importance ${weightMeta.class}">${weightMeta.label}</span>
      </div>
    </div>
  `;
}

function renderRichTimelineItem(evt, pushedAt) {
  const weightMeta = EVENT_WEIGHT_META[evt.weight] || EVENT_WEIGHT_META.medium;
  const timeLabel = formatEventRelativeTime(evt.minutesAgo, pushedAt);
  const metrics = evt.detail && evt.detail.metrics
    ? evt.detail.metrics.map(m => `<span class="timeline-metric">${m.label} ${m.value}</span>`).join('')
    : '';
  return `
    <div class="timeline-item weight-${evt.weight}">
      <div class="timeline-dot"></div>
      <div class="timeline-time">${timeLabel}</div>
      <div class="timeline-title">${evt.title}</div>
      <div class="timeline-meta">
        <span class="event-keyword-chip">${evt.keyword}</span>
        <span class="timeline-importance ${weightMeta.class}">${weightMeta.label}</span>
        ${(evt.themeTags || []).map(t => `<span class="event-keyword-chip" style="background:var(--surface-container);color:var(--muted-foreground)">${t}</span>`).join('')}
      </div>
      ${evt.summary ? `<div class="timeline-detail">${evt.summary}${evt.detail && evt.detail.body ? '<br><br>' + evt.detail.body : ''}</div>` : ''}
      ${metrics ? `<div class="timeline-metrics">${metrics}</div>` : ''}
    </div>
  `;
}
