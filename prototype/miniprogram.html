function buildMsgHtml(m) {
  let chainsHtml = '';
  if (m.chains && m.chains.length) {
    chainsHtml = '<div class="ai-msg-chains">' + m.chains.map((c, i) => {
      const chip = `<span class="ai-chain-chip ${c.t}">${c.n}</span>`;
      return i > 0 ? `<span class="ai-chain-arrow">→</span>${chip}` : chip;
    }).join('') + '</div>';
  } else if (m.stocks && m.stocks.length) {
    chainsHtml = '<div class="ai-msg-stocks">' + m.stocks.map(s =>
      `<span class="ai-stock-chip ${s.t}">${s.n} ${s.t === 'bullish' ? '利好' : '利空'}</span>`
    ).join('') + '</div>';
  }
  const isAi = m.role === 'ai';
  const avatar = isAi
    ? `<div class="ai-msg-avatar" aria-hidden="true">AI</div>`
    : `<div class="ai-msg-avatar" aria-hidden="true">${isLoggedIn ? 'L' : '我'}</div>`;
  return `
    <div class="ai-msg ${m.role}">
      ${avatar}
      <div class="ai-msg-main">
        <div class="msg-bubble">${m.html}${chainsHtml}</div>
      </div>
    </div>
  `;
}

const profilePendingMainlineIds = ['evt-ai-supply', 'evt-rare-earth'];

function renderProfilePointsDetail() {
  const rows = [
    { icon: '签', title: '每日登录', desc: '每日首次登录自动累计', value: '+20' },
    { icon: '问', title: '有效提问', desc: '完成一次问潮深度交流', value: '+10' },
    { icon: '阅', title: '阅读主线', desc: '查看每日重要推理主线', value: '+5' },
    { icon: '跟', title: '新增跟踪', desc: '跟踪主线、产业或企业', value: '+15' },
  ];
  return `
    <div class="profile-metric-summary">
      <strong>1,280 积分</strong>
      <span>本月已累计 320 积分 · 每日任务于 00:00 刷新</span>
    </div>
    <div class="profile-points-list">
      ${rows.map(row => `
        <div class="profile-points-row">
          <span class="profile-points-icon">${row.icon}</span>
          <span><b>${row.title}</b><small>${row.desc}</small></span>
          <span class="profile-points-value">${row.value}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderProfileLoginCalendar() {
  const firstWeekday = 3;
  const loggedDays = new Set([10, 11, 12, 13, 14, 15, 16]);
  const cells = [
    ...Array.from({ length: firstWeekday }, () => '<span class="profile-calendar-day is-empty"></span>'),
    ...Array.from({ length: 31 }, (_, index) => {
      const day = index + 1;
      const classes = [
        'profile-calendar-day',
        loggedDays.has(day) ? 'is-logged' : '',
        day === 16 ? 'is-today' : '',
      ].filter(Boolean).join(' ');
      return `<span class="${classes}">${day}</span>`;
    }),
  ].join('');
  return `
    <div class="profile-metric-summary">
      <strong>已连续登录 7 天</strong>
      <span>连续登录可获得成长积分，今日已完成登录</span>
    </div>
    <div style="margin-top:14px">
      <div class="profile-calendar-head">2026 年 7 月 <span>本月登录 12 天</span></div>
      <div class="profile-calendar-week">
        ${['日','一','二','三','四','五','六'].map(day => `<span>${day}</span>`).join('')}
      </div>
      <div class="profile-calendar-grid">${cells}</div>
    </div>
  `;
}

function renderProfilePendingMainlines() {
  const items = profilePendingMainlineIds
    .map(id => getEventById(id))
    .filter(Boolean);
  return `
    <div class="profile-pending-list">
      ${items.map(item => `
        <article class="profile-pending-item">
          <div class="profile-pending-item-head">
            <b>每日重要主线 · 未查看</b>
            <span>${escapeHtml(item.category)}</span>
          </div>
          <strong>${escapeHtml(item.mainlineBrief?.headline || item.narrativeTitle)}</strong>
          <button type="button" onclick="openPendingMainline('${item.id}')">查看主线分析 ›</button>
        </article>
      `).join('')}
    </div>
  `;
}

function openPendingMainline(eventId) {
  closeAllSheets();
  setTimeout(() => openAnalysisStory(eventId), 140);
}

function openProfileMetricDetail(type) {
  if (!requireLogin(
    () => openProfileMetricDetail(type),
    '确认手机号后，即可查看个人数据与记录'
  )) return;
  if (type === 'questions') {
    openExplorationHistory();
    return;
  }
  const content = {
    points: {
      title: '积分明细',
      subtitle: '成长积分累计规则',
      html: renderProfilePointsDetail(),
    },
    login: {
      title: '连续登录',
      subtitle: '登录日历',
      html: renderProfileLoginCalendar(),
    },
    tracking: {
      title: '跟踪中的内容',
      subtitle: `宏观 + 微观 · 共 ${getTotalWatchingCount()} 项跟踪`,
      html: renderWatchTrackingSheetBody(),
    },
    pending: {
      title: '待查看',
      subtitle: '每日推荐的重要推理主线',
      html: renderProfilePendingMainlines(),
    },
  }[type];
  if (!content) return;
  document.getElementById('detailTitle').textContent = content.title;
  document.getElementById('detailSubtitle').textContent = content.subtitle;
  document.getElementById('detailBody').innerHTML = content.html;
  showSheet('detailSheet');
}

let profileTrackTab = 'mainline';

function switchProfileTrackTab(name) {
  profileTrackTab = ['mainline', 'target'].includes(name) ? name : 'mainline';
  const isMain = profileTrackTab === 'mainline';
  const isTarget = profileTrackTab === 'target';
  document.getElementById('profileTabMainline')?.classList.toggle('is-active', isMain);
  document.getElementById('profileTabTarget')?.classList.toggle('is-active', isTarget);
  document.getElementById('profilePaneMainline')?.classList.toggle('is-active', isMain);
  document.getElementById('profilePaneTarget')?.classList.toggle('is-active', isTarget);
  if (isTarget) renderMicroTracking();
}

function getMicroWatchGroup(w) {
  if (w.microGroup) return w.microGroup;
  if (w.type === 'fx') return 'macro-index';
  if (w.type === 'asset') return 'commodity';
  if (w.type === 'sector') return 'sector';
  if (w.type === 'stock') return 'enterprise';
  return 'enterprise';
}

function renderProfileTrackGroup(title, count, bodyHtml) {
  if (!bodyHtml) return '';
  return `
    <section class="profile-track-group">
      <div class="profile-track-group-head">
        <span class="profile-track-group-title">${title}</span>
        <span class="profile-track-group-count">${count}</span>
      </div>
      <div class="profile-track-group-body">${bodyHtml}</div>
    </section>
  `;
}

function getMacroMetricTone(metric) {
  const m = String(metric || '');
  if (/^-/.test(m.trim()) || (m.includes('-') && !m.includes('+'))) return 'down';
  if (m.includes('+')) return 'up';
  return 'neutral';
}

function formatMacroTrackDuration(days) {
  const d = Number(days) || 0;
  if (d <= 0) return '今日跟踪';
  if (d < 7) return `跟踪 ${d} 天`;
  if (d < 30) return `跟踪 ${Math.floor(d / 7)} 周`;
  return `跟踪 ${Math.floor(d / 30)} 个月`;
}

function renderMacroTrackRowMeta(item, opts = {}) {
  if (opts.mainline || item.nextWind) {
    return `
      <div class="profile-track-row-meta">
        <span class="profile-track-row-next-label">下一风口</span>
        <span class="profile-track-row-next-wind">${item.nextWind || ''}</span>
        <span class="profile-track-row-duration">${formatMacroTrackDuration(item.trackedDays)}</span>
      </div>
    `;
  }
  const hot = item.hotStatus || '';
  const metric = item.headlineMetric || '';
  const metricTone = item.metricTone || getMacroMetricTone(metric);
  const hotClass = item.stage ? ` stage-${item.stage}` : '';
  return `
    <div class="profile-track-row-meta">
      ${hot ? `<span class="profile-track-row-hot${hotClass}">${hot}</span>` : ''}
      ${metric ? `<span class="profile-track-row-metric ${metricTone}">${metric}</span>` : ''}
      <span class="profile-track-row-duration">${formatMacroTrackDuration(item.trackedDays)}</span>
    </div>
  `;
}

function renderMacroMainlineRow(item) {
  const stageClass = item.stage ? ` stage-${item.stage}` : '';
  return `
    <div class="profile-track-row${stageClass}" onclick="openIndustryChainNodeTrack('${item.judgmentId}', '${item.chainId || ''}', '${item.layerId || ''}')" role="button" tabindex="0">
      <div class="profile-track-row-main">
        <div class="profile-track-row-title">${item.title}</div>
        <div class="profile-track-row-desc">${item.ignitePoint || item.desc || ''}</div>
      </div>
      ${renderMacroTrackRowMeta(item, { mainline: true })}
    </div>
  `;
}

function openIndustryChainNodeTrack(judgmentId, chainId, layerId) {
  if (!requireLogin(
    () => openIndustryChainNodeTrack(judgmentId, chainId, layerId),
    '确认手机号后，即可打开已跟踪内容'
  )) return;
  openIndustryChainPage(judgmentId, chainId);
  if (!layerId) return;
  industryChainActiveLayerId = layerId;
  const body = document.getElementById('industryChainBody');
  const judgment = body?.dataset.judgmentId;
  const chain = body?.dataset.chainId || '';
  if (judgment) body.innerHTML = renderIndustryChainPage(judgment, chain);
}

function renderMacroIndustryNodeRow(item) {
  const stageClass = item.stage ? ` stage-${item.stage}` : '';
  const title = item.layerName || item.nodeName || '';
  return `
    <div class="profile-track-row${stageClass}" onclick="openIndustryChainNodeTrack('${item.judgmentId}', '${item.chainId || ''}', '${item.layerId || ''}')" role="button" tabindex="0">
      <div class="profile-track-row-main">
        <div class="profile-track-row-title">${title}</div>
        <div class="profile-track-row-desc">${item.ignitePoint || item.desc || ''}</div>
      </div>
      ${renderMacroTrackRowMeta(item)}
    </div>
  `;
}

function renderMacroTracking() {
  const el = document.getElementById('macroTrackList');
  if (!el) return;
  const { mainlines, industryNodes } = getMacroTrackingItems();
  if (!mainlines.length && !industryNodes.length) {
    el.innerHTML = '<div class="profile-track-empty">暂无宏观观潮<br>可在观潮分析卡片中跟踪主线与产业链节点</div>';
    return;
  }
  el.innerHTML = [
    mainlines.length
      ? renderProfileTrackGroup('主线跟踪', mainlines.length, mainlines.map(renderMacroMainlineRow).join(''))
      : '',
    industryNodes.length
      ? renderProfileTrackGroup('产业链跟踪', industryNodes.length, industryNodes.map(renderMacroIndustryNodeRow).join(''))
      : '',
  ].join('');
}

function renderMicroTracking() {
  const el = document.getElementById('microTrackList');
  if (!el) return;
  const groups = getActiveMicroWatchGroups(MOCK.dailyBrief.watchTargets.filter(w => w.watching));
  if (!groups.length) {
    el.innerHTML = '<div class="profile-track-empty">暂无微观观潮<br>可跟踪汇率、商品与企业</div>';
    return;
  }
  el.innerHTML = groups.map(g =>
    renderProfileTrackGroup(g.label, g.items.length, `<div class="watch-target-list">${g.items.map(renderMicroWatchTargetItem).join('')}</div>`)
  ).join('');
}

function renderSubscriptions() {
  renderMacroTracking();
}

function renderWatchTargetsProfile() {
  renderMicroTracking();
}

function showSheet(id) {
  const sheet = document.getElementById(id);
  if (id === 'detailSheet') resetDetailSheetAnchor(sheet);
  document.getElementById('overlayMask').classList.add('show');
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('show'));
  sheet.classList.add('show');
  document.getElementById('phoneFrame').classList.add('has-sheet');
}

function syncLoginButtonState() {
  const agree = document.getElementById('loginAgree');
  const button = document.getElementById('loginConfirmBtn');
  if (button) button.disabled = !agree?.checked;
}

function openLoginSheet(reason = '登录后可继续跟踪、节点分析和深度对话') {
  const reasonEl = document.getElementById('loginReason');
  const mobileEl = document.getElementById('loginMobile');
  const agree = document.getElementById('loginAgree');
  if (reasonEl) reasonEl.textContent = reason;
  if (mobileEl) mobileEl.textContent = CURRENT_MOBILE;
  if (agree) agree.checked = false;
  syncLoginButtonState();
  showSheet('loginSheet');
}

function requireLogin(action, reason) {
  if (isLoggedIn) return true;
  pendingLoginAction = typeof action === 'function' ? action : null;
  openLoginSheet(reason);
  return false;
}

function closeAllSheets() {
  pendingLoginAction = null;
  closeHintPopover();
  closeChainGraph();
  closeIndustryChainPage();
  document.getElementById('overlayMask').classList.remove('show');
  document.getElementById('phoneFrame').classList.remove('has-sheet');
  document.querySelectorAll('.sheet').forEach(s => {
    s.classList.remove('show');
    if (s.id === 'detailSheet') resetDetailSheetAnchor(s);
  });
}

function doLogin() {
  const agree = document.getElementById('loginAgree');
  if (!agree?.checked) {
    showToast('请先阅读并同意用户协议与隐私政策');
    return;
  }
  const nextAction = pendingLoginAction;
  pendingLoginAction = null;
  isLoggedIn = true;
  closeAllSheets();
  updateNavAvatar();
  showToast('手机号登录成功');
  if (typeof nextAction === 'function') {
    setTimeout(nextAction, 180);
  }
}

function aiQuickAsk(q) {
  if (!requireLogin(
    () => aiQuickAsk(q),
    '确认手机号后，即可使用推荐问题继续交流'
  )) return;
  switchTab('ai', { animate: true });
  const input = document.getElementById('composerInput');
  input.value = q;
  sendAiChat();
}

function sendAiChat() {
  if (!requireLogin(
    () => sendAiChat(),
    '确认手机号后，即可向问潮发送问题'
  )) return;
  if (currentMode !== 'ai') switchTab('ai', { animate: true });
  const input = document.getElementById('composerInput');
  const text = input.value.trim();
  if (!text) {
    input.focus();
    return;
  }
  const container = document.getElementById('aiMessages');
  container.innerHTML += buildMsgHtml({ role: 'user', label: '我', html: text });
  input.value = '';
  const resp = MOCK.aiResponses[text] || MOCK.aiResponses.default;
  setTimeout(() => {
    container.innerHTML += buildMsgHtml({ role: 'ai', label: '问潮', html: resp.text, chains: resp.chains });
    container.scrollTop = container.scrollHeight;
  }, 600);
  container.scrollTop = container.scrollHeight;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,23,42,0.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

init();
</script>
