<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>观潮家｜产业链影响推理树原型</title>
  <!--
    PROTOTYPE — throwaway UI exploration, not production code.
    Question: how should one Theme expand into multiple anchor-specific causal research trees?
    Run: python3 -m http.server 63094 --directory tidewise-ai/prototype
    Open: http://localhost:63094/reasoning-tree-prototype.html?variant=A
  -->
  <link rel="stylesheet" href="./.design_library/观潮家/colors_and_type.css">
  <link rel="stylesheet" href="./.design_library/观潮家/components.css">
  <style>
    * { box-sizing: border-box; }
    html { background: #dbe3ee; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(37, 99, 235, .13), transparent 32%),
        #e9eef5;
      color: var(--tide-gray-900);
      font-family: var(--font-body), "PingFang SC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; }

    .prototype-stage {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 96px;
    }
    .phone {
      width: min(100%, 430px);
      min-height: 932px;
      overflow: hidden;
      background: var(--tide-gray-50);
      border: 8px solid #172554;
      border-radius: 40px;
      box-shadow: var(--shadow-5);
      position: relative;
    }
    .status-bar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 0;
      background: #172554;
      color: #fff;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
    }
    .status-icons { display: flex; align-items: center; gap: 7px; }
    .status-icons svg { width: 15px; height: 15px; stroke-width: 2; }

    .theme-hero {
      color: #fff;
      padding: 12px 18px 20px;
      background:
        linear-gradient(140deg, #172554 0%, #1e3a8a 58%, #1d4ed8 100%);
      position: relative;
      overflow: hidden;
    }
    .theme-hero::after {
      content: "";
      position: absolute;
      width: 230px;
      height: 230px;
      right: -112px;
      bottom: -150px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 50%;
      box-shadow: 0 0 0 38px rgba(255,255,255,.025), 0 0 0 76px rgba(255,255,255,.018);
    }
    .hero-nav,
    .hero-meta,
    .hero-summary,
    .hero-path { position: relative; z-index: 1; }
    .hero-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .icon-button {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #fff;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: var(--radius-md);
    }
    .icon-button svg { width: 20px; height: 20px; }
    .hero-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,.72);
      font-size: 11px;
      margin-bottom: 10px;
    }
    .hero-meta .impact {
      color: #fff;
      background: rgba(245,158,11,.22);
      border: 1px solid rgba(245,158,11,.56);
      padding: 3px 7px;
      border-radius: var(--radius-sm);
      font-weight: 600;
    }
    .hero-summary {
      margin: 0;
      font-size: 21px;
      line-height: 1.42;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .hero-path {
      margin: 11px 0 0;
      padding-left: 11px;
      border-left: 2px solid #f59e0b;
      color: rgba(255,255,255,.82);
      font-size: 12px;
      line-height: 1.6;
    }

    .anchor-tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 14px;
      background: rgba(248,250,252,.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--tide-gray-200);
    }
    .anchor-tabs-label {
      display: flex;
      justify-content: space-between;
      color: var(--tide-gray-500);
      font-size: 10px;
      margin: 0 2px 7px;
    }
    .anchor-tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .anchor-tabs::-webkit-scrollbar { display: none; }
    .anchor-tab {
      height: 32px;
      flex: 0 0 auto;
      padding: 0 12px;
      border: 1px solid var(--tide-gray-200);
      border-radius: var(--radius-full);
      background: #fff;
      color: var(--tide-gray-600);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .anchor-tab.active {
      color: #fff;
      background: var(--tide-blue-600);
      border-color: var(--tide-blue-600);
      box-shadow: 0 4px 12px rgba(37,99,235,.20);
    }

    .screen-content { padding: 16px 14px 28px; }
    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 12px;
    }
    .section-heading h2 {
      margin: 0;
      color: #172554;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 700;
    }
    .section-heading span {
      flex: 0 0 auto;
      color: var(--tide-gray-400);
      font-size: 10px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--tide-gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
    }
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--tide-gray-500);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
    }
    .eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--tide-blue-500);
      box-shadow: 0 0 0 3px var(--tide-blue-50);
    }
    .source-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      border-radius: var(--radius-full);
      color: var(--tide-blue-700);
      background: var(--tide-blue-50);
      font-size: 10px;
      font-weight: 600;
    }
    .source-count svg { width: 11px; height: 11px; }

    /* Variant A — balanced causal tree */
    .variant-a .tree-stack { position: relative; display: grid; gap: 14px; }
    .variant-a .tree-stack::before {
      content: "";
      position: absolute;
      top: 32px;
      bottom: 52px;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(var(--tide-blue-300), var(--tide-blue-100) 72%, transparent);
      z-index: 0;
    }
    .variant-a .tree-stack > * { position: relative; z-index: 1; }
    .fact-card { padding: 14px; }
    .fact-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .fact-card h3 {
      margin: 0 0 9px;
      font-size: 15px;
      line-height: 1.5;
      color: #172554;
    }
    .fact-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .fact-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 8px;
      align-items: start;
      color: var(--tide-gray-600);
      font-size: 11px;
      line-height: 1.55;
    }
    .fact-number {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      color: var(--tide-blue-700);
      background: var(--tide-blue-50);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
    }
    .anchor-conclusion {
      padding: 15px;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, #1d4ed8, #172554);
      border: 1px solid #1e40af;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-3);
    }
    .anchor-conclusion small {
      display: block;
      margin-bottom: 6px;
      color: #fcd34d;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
    }
    .anchor-conclusion strong {
      display: block;
      font-size: 15px;
      line-height: 1.55;
    }
    .anchor-conclusion .direction {
      display: inline-flex;
      margin-top: 9px;
      padding: 3px 8px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: var(--radius-full);
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.08);
      font-size: 10px;
    }
    .evidence-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .evidence-card {
      min-width: 0;
      padding: 12px;
      border-top: 3px solid var(--tide-blue-500);
    }
    .evidence-card.counter { border-top-color: var(--tide-amber-500); }
    .evidence-card .branch-title {
      margin-bottom: 7px;
      color: var(--tide-blue-700);
      font-size: 11px;
      font-weight: 700;
    }
    .evidence-card.counter .branch-title { color: var(--tide-amber-700); }
    .evidence-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--tide-gray-800);
      font-size: 12px;
      line-height: 1.45;
    }
    .evidence-card p {
      margin: 0;
      color: var(--tide-gray-500);
      font-size: 10px;
      line-height: 1.55;
    }
    .chain-card { padding: 14px 10px 12px; overflow: hidden; }
    .chain-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 4px 12px;
    }
    .chain-card-head strong { color: #172554; font-size: 12px; }
    .chain-card-head span { color: var(--tide-gray-400); font-size: 9px; }
    .chain-scroll {
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .chain-scroll::-webkit-scrollbar { display: none; }
    .chain-flow {
      display: flex;
      width: max-content;
      min-width: 100%;
      align-items: stretch;
      position: relative;
      padding: 2px 4px 6px;
    }
    .chain-node {
      width: 112px;
      flex: 0 0 112px;
      position: relative;
      z-index: 1;
      padding: 10px 8px;
      text-align: center;
      background: var(--tide-gray-50);
      border: 1px solid var(--tide-gray-200);
      border-radius: var(--radius-md);
    }
    .chain-node.anchor {
      background: var(--tide-blue-50);
      border-color: var(--tide-blue-300);
      box-shadow: 0 0 0 3px rgba(37,99,235,.07);
    }
    .chain-node.inferred { border-style: dashed; }
    .chain-edge {
      width: 104px;
      flex: 0 0 104px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 7px;
      color: var(--tide-gray-500);
    }
    .chain-edge-line {
      width: 100%;
      height: 1px;
      position: relative;
      margin-bottom: 8px;
      background: var(--tide-blue-300);
    }
    .chain-edge-line::after {
      content: "";
      position: absolute;
      top: -4px;
      right: -1px;
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid var(--tide-blue-500);
    }
    .chain-edge p {
      margin: 0;
      color: var(--tide-gray-500);
      font-size: 9px;
      line-height: 1.45;
      text-align: center;
      white-space: normal;
    }
    .chain-node .node-index {
      display: block;
      color: var(--tide-gray-400);
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
    }
    .chain-node b {
      display: block;
      overflow: hidden;
      margin: 6px 0 4px;
      color: #172554;
      font-size: 11px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-shift {
      display: block;
      color: var(--tide-red-600);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
    }
    .node-shift.negative { color: var(--tide-green-600); }
    .node-shift.neutral { color: var(--tide-gray-500); }
    .chain-node p {
      margin: 6px 0 0;
      color: var(--tide-gray-500);
      font-size: 9px;
      line-height: 1.45;
    }
    .formal-tag {
      display: inline-flex;
      margin-top: 6px;
      padding: 2px 5px;
      border-radius: var(--radius-sm);
      color: var(--tide-blue-700);
      background: var(--tide-blue-100);
      font-size: 8px;
      font-weight: 600;
    }
    .formal-tag.infer {
      color: var(--tide-gray-600);
      background: var(--tide-gray-100);
    }
    .watch-card {
      padding: 12px 14px;
      background: #fffbeb;
      border-color: var(--tide-amber-200);
    }
    .watch-card strong {
      display: block;
      color: var(--tide-amber-800);
      font-size: 11px;
      margin-bottom: 5px;
    }
    .watch-card p {
      margin: 0;
      color: var(--tide-amber-900);
      font-size: 10px;
      line-height: 1.55;
    }

    /* Variant B — evidence balance */
    .variant-b .summary-panel { padding: 14px; margin-bottom: 12px; }
    .variant-b .summary-panel h3 {
      margin: 8px 0 9px;
      color: #172554;
      font-size: 16px;
      line-height: 1.5;
    }
    .variant-b .direction-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--tide-gray-500);
      font-size: 10px;
    }
    .variant-b .direction-line b {
      color: var(--tide-blue-700);
      background: var(--tide-blue-50);
      border-radius: var(--radius-sm);
      padding: 3px 6px;
    }
    .balance {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .balance-column {
      padding: 12px;
      background: #fff;
      border: 1px solid var(--tide-gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
    }
    .balance-column.support { box-shadow: inset 0 3px 0 var(--tide-blue-500), var(--shadow-1); }
    .balance-column.counter { box-shadow: inset 0 3px 0 var(--tide-amber-500), var(--shadow-1); }
    .balance-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      font-size: 11px;
      font-weight: 700;
    }
    .balance-title span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      background: var(--tide-gray-100);
      color: var(--tide-gray-500);
      font-size: 9px;
    }
    .balance-event {
      padding: 8px 0;
      border-top: 1px solid var(--tide-gray-100);
    }
    .balance-event:first-of-type { border-top: 0; padding-top: 0; }
    .balance-event b {
      display: block;
      margin-bottom: 3px;
      color: var(--tide-gray-700);
      font-size: 10px;
      line-height: 1.45;
    }
    .balance-event p {
      margin: 0;
      color: var(--tide-gray-400);
      font-size: 9px;
      line-height: 1.45;
    }
    .verdict-card {
      margin-bottom: 12px;
      padding: 14px;
      color: #fff;
      background: #172554;
      border-color: #172554;
    }
    .verdict-card small {
      display: block;
      margin-bottom: 6px;
      color: #fcd34d;
      font-size: 9px;
      letter-spacing: .08em;
    }
    .verdict-card strong { display: block; font-size: 14px; line-height: 1.55; }
    .verdict-card p { margin: 8px 0 0; color: rgba(255,255,255,.67); font-size: 10px; line-height: 1.5; }
    .vertical-chain { padding: 14px; }
    .vertical-chain h3 { margin: 0 0 12px; color: #172554; font-size: 12px; }
    .v-node {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 9px;
      align-items: start;
      position: relative;
      padding-bottom: 13px;
    }
    .v-node:last-child { padding-bottom: 0; }
    .v-node:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 24px;
      bottom: 2px;
      left: 13px;
      width: 1px;
      background: var(--tide-blue-200);
    }
    .v-index {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      color: #fff;
      background: var(--tide-blue-600);
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    .v-node.inferred .v-index { background: var(--tide-gray-400); }
    .v-copy b { display: block; color: var(--tide-gray-800); font-size: 11px; margin-bottom: 3px; }
    .v-copy p { margin: 0; color: var(--tide-gray-500); font-size: 9px; line-height: 1.5; }
    .v-shift { font-size: 10px; font-weight: 700; color: var(--tide-red-600); white-space: nowrap; }
    .v-shift.negative { color: var(--tide-green-600); }
    .v-shift.neutral { color: var(--tide-gray-500); }

    /* Variant C — transmission map */
    .variant-c .map-card { overflow: hidden; margin-bottom: 12px; }
    .variant-c .map-head {
      padding: 14px;
      color: #fff;
      background: linear-gradient(135deg, #1e40af, #172554);
    }
    .variant-c .map-head .eyebrow { color: rgba(255,255,255,.65); }
    .variant-c .map-head .eyebrow::before { background: #f59e0b; box-shadow: none; }
    .variant-c .map-head h3 { margin: 8px 0 0; font-size: 15px; line-height: 1.5; }
    .path-steps { padding: 8px 14px 14px; }
    .path-step {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 9px;
      position: relative;
      padding: 8px 0;
    }
    .path-step:not(:last-child)::after {
      content: "";
      position: absolute;
      left: 14px;
      top: 31px;
      bottom: -7px;
      width: 2px;
      background: var(--tide-blue-100);
    }
    .path-symbol {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: var(--tide-blue-50);
      color: var(--tide-blue-700);
      font-size: 12px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    .path-step:last-child .path-symbol { background: #fffbeb; color: var(--tide-amber-700); }
    .path-copy small { display: block; color: var(--tide-gray-400); font-size: 9px; margin-bottom: 2px; }
    .path-copy b { display: block; color: var(--tide-gray-800); font-size: 11px; line-height: 1.4; }
    .path-copy p { margin: 3px 0 0; color: var(--tide-gray-500); font-size: 9px; line-height: 1.45; }
    .signal-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--tide-gray-200);
      border-top: 1px solid var(--tide-gray-200);
    }
    .signal-cell { padding: 9px 6px; text-align: center; background: #fff; }
    .signal-cell span { display: block; color: var(--tide-gray-400); font-size: 8px; }
    .signal-cell b { display: block; margin-top: 3px; color: var(--tide-gray-700); font-size: 10px; }
    .variant-c .evidence-ledger { padding: 13px 14px; margin-bottom: 12px; }
    .ledger-row {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--tide-gray-100);
    }
    .ledger-row:first-of-type { border-top: 0; }
    .ledger-label {
      display: inline-flex;
      align-items: flex-start;
      gap: 5px;
      color: var(--tide-blue-700);
      font-size: 9px;
      font-weight: 700;
    }
    .ledger-label::before {
      content: "";
      width: 5px;
      height: 5px;
      margin-top: 4px;
      border-radius: 50%;
      background: currentColor;
    }
    .ledger-label.counter { color: var(--tide-amber-700); }
    .ledger-copy { color: var(--tide-gray-600); font-size: 10px; line-height: 1.5; }
    .variant-c .node-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .compact-node { padding: 11px; }
    .compact-node.anchor { border-color: var(--tide-blue-300); background: var(--tide-blue-50); }
    .compact-node b { display: block; color: #172554; font-size: 11px; }
    .compact-node .compact-shift { display: block; margin: 5px 0; font-size: 11px; font-weight: 700; color: var(--tide-red-600); }
    .compact-node .compact-shift.negative { color: var(--tide-green-600); }
    .compact-node .compact-shift.neutral { color: var(--tide-gray-500); }
    .compact-node p { margin: 0; color: var(--tide-gray-500); font-size: 9px; line-height: 1.45; }

    .prototype-switcher {

      return `
        <div class="variant-b">
          <div class="section-heading">
            <h2>${escapeHtml(anchor.name)}证据天平</h2>
            <span>${anchor.eventCount} 条 Event</span>
          </div>

          <article class="card summary-panel">
            <span class="eyebrow">当前研究问题</span>
            <h3>${escapeHtml(anchor.factTitle)}</h3>
            <div class="direction-line"><b>${escapeHtml(anchor.direction)}</b><span>证据与反证必须同时成立检验</span></div>
          </article>

          <div class="balance">
            <article class="balance-column support">
              <div class="balance-title">支持证据 <span>2</span></div>
              ${renderBalanceEvents(anchor, 'support')}
            </article>
            <article class="balance-column counter">
              <div class="balance-title">反向证据 <span>2</span></div>
              ${renderBalanceEvents(anchor, 'counter')}
            </article>
          </div>

          <article class="card verdict-card">
            <small>综合判定</small>
            <strong>${escapeHtml(anchor.conclusion)}</strong>
            <p>该判断不是买卖指令；烈度只有在检查点得到新事实后才上调或下调。</p>
          </article>

          <article class="card vertical-chain">
            <h3>节点影响顺序</h3>
            ${renderVerticalNodes(anchor)}
          </article>

          <article class="card watch-card" style="margin-top:12px">
            <strong>下一检查点</strong>
            <p>${escapeHtml(anchor.checkpoint)}</p>
          </article>
        </div>
      `;
    }

    function renderPathSteps(anchor) {
      return anchor.pathSteps.map((step, index) => `
        <div class="path-step">
          <span class="path-symbol">${index + 1}</span>
          <div class="path-copy">
            <small>${escapeHtml(step[0])}</small>
            <b>${escapeHtml(step[1])}</b>
            <p>${escapeHtml(step[2])}</p>
          </div>
        </div>
      `).join('');
    }

    function renderCompactNodes(anchor) {
      return anchor.nodes.map(node => `
        <article class="card compact-node ${node.anchor ? 'anchor' : ''}">
          <b>${escapeHtml(node.name)}</b>
          <span class="compact-shift ${toneClass(node.tone)}">${escapeHtml(node.shift)}</span>
          <p>${escapeHtml(node.summary)}</p>
        </article>
      `).join('');
    }

    function renderVariantC(anchor) {
      return `
        <div class="variant-c">
          <div class="section-heading">
            <h2>${escapeHtml(anchor.name)}传导路径</h2>
            <span>因果链视图</span>
          </div>

          <article class="card map-card">
            <div class="map-head">
              <span class="eyebrow">锚点方向判断</span>
              <h3>${escapeHtml(anchor.conclusion)}</h3>
            </div>
            <div class="path-steps">${renderPathSteps(anchor)}</div>
            <div class="signal-strip">
              <div class="signal-cell"><span>证据数量</span><b>${anchor.eventCount} 条</b></div>
              <div class="signal-cell"><span>传导状态</span><b>验证期</b></div>
              <div class="signal-cell"><span>研究动作</span><b>继续跟踪</b></div>
            </div>
          </article>

          <article class="card evidence-ledger">
            <div class="ledger-row">
              <span class="ledger-label">支持逻辑</span>
              <span class="ledger-copy">${escapeHtml(anchor.support.claim)}。${escapeHtml(anchor.support.detail)}</span>
            </div>
            <div class="ledger-row">
              <span class="ledger-label counter">反向逻辑</span>
              <span class="ledger-copy">${escapeHtml(anchor.counter.claim)}。${escapeHtml(anchor.counter.detail)}</span>
            </div>
          </article>

          <div class="node-grid">${renderCompactNodes(anchor)}</div>

          <article class="card watch-card">
            <strong>下一检查点</strong>
            <p>${escapeHtml(anchor.checkpoint)}</p>
          </article>
        </div>
      `;
    }

    function getVariantKey() {
      const params = new URLSearchParams(window.location.search);
      const key = (params.get('variant') || 'A').toUpperCase();
      return variants.some(item => item.key === key) ? key : 'A';
    }

    function setVariant(key) {
      const url = new URL(window.location.href);
      url.searchParams.set('variant', key);
      window.history.replaceState({}, '', url);
      renderVariant();
    }

    function cycleVariant(offset) {
      const current = variants.findIndex(item => item.key === getVariantKey());
      const next = (current + offset + variants.length) % variants.length;
      setVariant(variants[next].key);
    }

    function renderVariant() {
      const key = getVariantKey();
      const anchor = prototypeData.anchors.find(item => item.id === currentAnchorId) || prototypeData.anchors[0];
      const content = document.getElementById('screenContent');
      content.innerHTML = key === 'B' ? renderVariantB(anchor) : key === 'C' ? renderVariantC(anchor) : renderVariantA(anchor);
      const descriptor = variants.find(item => item.key === key);
      document.getElementById('variantLabel').innerHTML = `<b>${descriptor.key}</b>${descriptor.name}`;
    }

    document.getElementById('variantPrev').addEventListener('click', () => cycleVariant(-1));
    document.getElementById('variantNext').addEventListener('click', () => cycleVariant(1));
    document.addEventListener('keydown', event => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable) return;
      if (event.key === 'ArrowLeft') cycleVariant(-1);
      if (event.key === 'ArrowRight') cycleVariant(1);
    });
    window.addEventListener('popstate', renderVariant);

    renderTabs();
    renderVariant();
  </script>
</body>
</html>
