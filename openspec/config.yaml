schema: spec-driven

context: |
  项目名称：观潮家。
  产品领域：面向全球宏观与市场事件智能的跨平台小程序，覆盖事件跟踪、因果推理、板块/资产传导分析、订阅和 AI 辅助市场理解；产品提供决策辅助，不得表达为直接投资建议。

  稳定项目背景与仓库边界：`tidewise-ai/` 是源码工程和 OpenSpec 根目录；`prototype/` 是只读原型参考；`doc/` 是只读长期文档空间。除非 change 明确要求，不修改 prototype 或 doc。

  当前架构：前端采用 Taro + React + TypeScript，后端采用 Go + Gin 单 module、多可部署进程结构；`cmd/*` 是入口，`internal/apps/*` 是业务子系统，`internal/domain`、`internal/repositories`、`internal/config` 和 `internal/platform` 是共享层。PostgreSQL 是实体、事件和关系事实源，Neo4j 是可从 PostgreSQL 重建的图投影，Redis 只承担缓存、限流、幂等和短期任务状态。

  配置与安全：local、uat、prod 使用统一强类型配置；敏感配置只能由环境变量或部署 secret 注入，不得提交或打印 secrets、tokens、连接串、模型 key 或个人隐私。

  OpenSpec artifact 写作约束：内容默认使用中文；固定标题、关键字、命令、文件名、路径、代码标识和协议字段可以保留英文。

rules:
  proposal:
    - "说明 change 的仓库区域、影响范围和 prototype/doc 非目标。"
  design:
    - "说明目标、非目标、关键决策、风险和验证边界。"
  specs:
    - "使用用户可观察的 requirements 和 WHEN/THEN scenarios，不写实现 checklist。"
  tasks:
    - "使用可验证的内聚 package、Gate Map 和 Complexity Budget；普通测试、修复、commit 和 push 不单独制造人工 gate。"
