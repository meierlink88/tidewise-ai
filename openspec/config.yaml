schema: spec-driven

context: |
  项目名称：观潮家。
  产品领域：面向全球宏观与市场事件智能的跨平台小程序，首批目标包含微信和抖音小程序，聚焦事件跟踪、因果推理、板块/资产传导分析、订阅和 AI 辅助市场理解。产品提供决策辅助，不得把内容表达为直接投资建议。

  仓库布局：
  - /Users/meierlink/Documents/david/创业项目/观潮家/tidewise-ai 是源码工程根目录和 OpenSpec 根目录。所有实现代码、小程序配置、OpenSpec changes、specs 和 Codex OpenSpec skills 都放在这里。
  - /Users/meierlink/Documents/david/创业项目/观潮家/prototype 是原型/设计目录，包含高保真原型资产，只作为参考材料，不作为生产源码。
  - /Users/meierlink/Documents/david/创业项目/观潮家/doc 是项目文档空间，放商业计划、产品设计、架构说明、数据模型和其他规划文档。除非某个 change 明确要求更新文档，否则只作为参考材料。

  当前工程状态：
  - tidewise-ai 目录仍处于绿地源码基线。
  - tidewise-ai 已使用 spec-driven schema 配置 OpenSpec 1.5.0。
  - Codex Desktop 集成使用 .codex/skills/openspec-*/SKILL.md 下的 OpenSpec skills。
  - tidewise-ai 中尚未包含 Taro 跨平台小程序应用骨架或 Go 后端骨架。

  目标平台和实现预期：
  - 除非后续已批准的 OpenSpec change 另有决定，否则前端按 Taro + React + TypeScript 跨平台小程序建设。
  - 前端源码位于 `frontend/miniapp/`，面向微信和抖音小程序输出。
  - 后端按 Go + Gin API/BFF 技术栈建设，源码位于 `backend/`。
  - 后端技术选型同时要求适合 AI 编程协作：语言和框架应具备强类型、清晰工程约定、直接编译反馈、易测试和低歧义代码风格。
  - 后端必须标准化支持 local、uat、prod 三类环境配置。非敏感配置结构可以入库，敏感信息必须通过环境变量或部署平台 secret 注入，不得提交到 repo。
  - 后端业务代码只能依赖统一的 Go 强类型 config，不得散落读取环境变量或硬编码环境差异。
  - AI 推理、RAG、Agent 工作流编排和 Prompt 编排主要由外部 Agent 平台承载，本工程只负责后端 API 调用、回调接收、结构化结果校验、落库和展示。
  - 除非用户明确要求，prototype 视觉资产和产品文档必须留在源码实现之外。
  - 将 prototype 中的 DOM/HTML 行为转换为 Taro/React 数据驱动渲染方式，避免浏览器 DOM 操作和平台专属实现直接进入业务层。
  - 生产小程序代码中不得使用 document、window、innerHTML、直接 DOM mutation 或内联 onclick 等浏览器专属 API。
  - 实现页面时，应将 mock/领域数据从 UI 代码中抽离到专门 data 或 service 模块。
  - 除非用户明确要求，不要在源码中添加注释。
  - 遵守安全最佳实践，不得硬编码或打印 secrets、tokens 或私有凭证。
  - OpenSpec 生成内容默认必须使用中文。只有 OpenSpec 规范要求的框架性文案、固定标题、关键字、命令、文件名、路径、代码标识和协议字段可以保留英文。

rules:
  language:
    - "所有 OpenSpec artifact 正文内容默认必须使用中文。"
    - "只有 OpenSpec 规范要求的框架性文案、固定标题、关键字、命令、文件名、路径、代码标识和协议字段可以保留英文。"
    - "proposal、design、tasks、requirement、scenario、rationale、risk、impact 和 validation 描述必须使用中文。"
  proposal:
    - "明确说明本 change 涉及哪些仓库区域：tidewise-ai 源码、prototype 参考或 doc 更新。"
    - "当 change 可能外溢到 prototype 或文档工作时，必须写清楚非目标。"
  design:
    - "涉及 UI 实现时，必须描述小程序页面、组件和数据边界。"
    - "如果涉及从 prototype-only 行为迁移到生产小程序行为，必须明确说明迁移方式。"
  specs:
    - "编写用户可观察的 requirements 和 scenarios，不要把 specs 写成实现 checklist。"
    - "当影响分析、推荐或 AI 响应时，必须包含投资建议安全边界。"
  tasks:
    - "将实现拆成可验证任务，并与小程序文件或模块对齐。"
    - "包含适合 Taro 跨平台小程序和 Go 后端开发的验证任务。"
