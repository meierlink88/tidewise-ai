name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Data API and typed-client drift contracts
        run: go test ./services/data/api ./services/miniapp/dataclient ./services/adminportal/dataclient

      - name: Architecture and reference contracts
        run: go test ./internal/architecture

      - name: Test backend
        run: go test ./...

      - name: Build service binaries
        run: |
          go build -o /tmp/data-service ./services/data/cmd
          go build -o /tmp/miniapp-service ./services/miniapp/cmd
          go build -o /tmp/adminportal-service ./services/adminportal/cmd

      - name: Build service images
        run: |
          docker build -f services/data/Dockerfile -t tidewise-data:ci .
          docker build -f services/miniapp/Dockerfile -t tidewise-miniapp:ci .
          docker build -f services/adminportal/Dockerfile -t tidewise-adminportal:ci .

  admin:
    name: Admin portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
