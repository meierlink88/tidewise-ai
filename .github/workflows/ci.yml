name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tidewise
          POSTGRES_PASSWORD: tidewise-ci-password
          POSTGRES_DB: tidewise_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tidewise -d tidewise_local"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: src/backend/go.mod
          cache-dependency-path: src/backend/go.sum

      - name: Verify Go formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following Go files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet backend
        run: go vet ./...

      - name: Data PostgreSQL integration
        env:
          TIDEWISE_TEST_DATABASE_URL: postgres://tidewise:tidewise-ci-password@localhost:5432/tidewise_local?sslmode=disable
        run: go test ./services/data/adapters/dbmigration ./services/data/cmd/research-theme-dev-reset ./services/data/transport/internalapi -run '^(TestPostgres(ResearchAnchorReasoningTreeMigration|ResearchAnchorBranchSummariesMigration|TypedMasterDataMigration|RunReset|EventPublicationV2.*)|TestEventPublicationV2MigrationPreservesHistoricalEvidenceContent)$' -count=1

      - name: Data API and typed-client drift contracts
        run: go test ./services/data/api ./services/miniapp/dataclient ./services/adminportal/dataclient

      - name: Architecture and reference contracts
        run: go test ./internal/architecture

      - name: Test backend
        run: go test -race ./...

      - name: Build service binaries
        run: |
          go build -o /tmp/data-service ./services/data/cmd
          go build -o /tmp/miniapp-service ./services/miniapp/cmd
          go build -o /tmp/adminportal-service ./services/adminportal/cmd

      - name: Build service images
        run: |
          docker build -f services/data/Dockerfile -t tidewise-data:ci .
          docker build -f services/miniapp/Dockerfile -t tidewise-miniapp:ci .
          docker build -f services/adminportal/Dockerfile -t tidewise-adminportal:ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify changed frontend and workflow formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bash scripts/ci/check-prettier-diff.sh

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint Miniapp
        run: npm run lint

      - name: Build Miniapp
        env:
          TARO_APP_RESEARCH_SOURCE: api
          TARO_APP_MINIAPP_API_BASE_URL: https://miniapp.example.invalid
        run: npm run build:weapp

      - name: Build Admin portal
        run: npm run build:admin

      - name: Build Admin portal image
        run: docker build -f src/frontend/admin/Dockerfile -t tidewise-admin:ci .

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Scan commits for credentials
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
